<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TreeScout</title>
<!--
  TreeScout UIモック v2 — mock.html のUI/UX改善版
  ・3ペイン構成（結果リスト / カラム探索＋ヒートマップ / プレビュー）
  ・A*探索デモアニメーション（Enterで再生 / Escで中断）
  ・実データ結合なし。デザイントークン・状態表現・モーション仕様のリファレンス
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  /* ═══════════════════════════════════════
     SECTION S1: デザイントークン・リセット・共通部品
  ═══════════════════════════════════════ */
  :root {
    /* サーフェス（GitHub Dark 系・mock.html から継承） */
    --bg:  #0d1117;
    --bg2: #161b22;
    --bg3: #1c2128;
    --bg4: #262c36;
    --bg5: #2d333b;
    --border:        #373e47;
    --border-subtle: #2d333b;

    /* テキスト3階層（bg 上のコントラスト: 16.0 / 6.5 / 4.1 — text3 は補助ラベル専用） */
    --text:  #e6edf3;
    --text2: #9198a1;
    --text3: #6e7681;

    /* アクセント */
    --accent:        #316dca;
    --accent-bright: #58a6ff;
    --sel-bg:        #1c2d3f;
    --sel-bg-hover:  #21344d;
    --sel-border:    #316dca;
    --hover-bg: rgba(177,186,196,0.07);

    /* 意味色 */
    --success: #3fb950;
    --warn:    #d29922;
    --danger:  #f85149;

    /* ヒートマップ: hsl(220,80%, 20%+score*60%) はJS側 heatBg() で算出（frontend.md準拠） */
    --heat-alpha-max: 0.35;

    /* 拡張子カラー */
    --folder:  #c69026;
    --c-tsx:   #58a6ff;
    --c-ts:    #3b82f6;
    --c-css:   #7ee8fa;
    --c-md:    #768390;
    --c-json:  #e3b341;
    --c-rs:    #f07178;
    --c-toml:  #e8b250;
    --c-other: #6e7681;

    /* タイポグラフィ */
    --font: 'Inter', 'Segoe UI', 'Yu Gothic UI', sans-serif;
    --font-mono: ui-monospace, 'Cascadia Code', 'Consolas', monospace;

    /* モーション（exit は enter の約65%） */
    --ease-out: cubic-bezier(0.2, 0, 0, 1);
    --dur-hover: 100ms;
    --dur-enter: 180ms;
    --dur-exit:  120ms;
    --dur-panel: 240ms;

    /* 余白・角丸 */
    --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;  --sp-4: 16px;  --sp-6: 24px;
    --r-sm: 4px;  --r-md: 6px;  --r-pill: 999px;

    /* ペイン幅 */
    --left-w:  320px;
    --right-w: 380px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { color-scheme: dark; }

  body {
    font-family: var(--font);
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* キーボードヒント用チップ */
  kbd {
    font: 500 10px var(--font);
    color: var(--text2);
    background: var(--bg4);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 5px;
  }

  /* 拡張子バッジ */
  .ext-badge {
    flex-shrink: 0;
    width: 26px; height: 18px;
    border-radius: 3px;
    font-size: 8px; font-weight: 700; letter-spacing: 0.02em;
    display: flex; align-items: center; justify-content: center;
  }
  .ext-tsx  { background: rgba(88,166,255,0.18);  color: var(--c-tsx);   border: 1px solid rgba(88,166,255,0.25); }
  .ext-ts   { background: rgba(59,130,246,0.18);  color: var(--c-ts);    border: 1px solid rgba(59,130,246,0.25); }
  .ext-css  { background: rgba(126,232,250,0.14); color: var(--c-css);   border: 1px solid rgba(126,232,250,0.20); }
  .ext-md   { background: rgba(118,131,144,0.18); color: var(--c-md);    border: 1px solid rgba(118,131,144,0.25); }
  .ext-json { background: rgba(227,179,65,0.15);  color: var(--c-json);  border: 1px solid rgba(227,179,65,0.22); }
  .ext-rs   { background: rgba(240,113,120,0.15); color: var(--c-rs);    border: 1px solid rgba(240,113,120,0.22); }
  .ext-toml { background: rgba(232,178,80,0.15);  color: var(--c-toml);  border: 1px solid rgba(232,178,80,0.22); }
  .ext-other{ background: rgba(110,118,129,0.15); color: var(--c-other); border: 1px solid rgba(110,118,129,0.22); }

  /* 共通ボタン */
  .btn-sm {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text2);
    font: 400 11px var(--font);
    padding: 4px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: background var(--dur-hover), color var(--dur-hover);
  }
  .btn-sm:hover { background: var(--bg5); color: var(--text); }
  .btn-sm:active { background: var(--bg4); }

  .btn-primary {
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: var(--r-sm);
    color: #fff;
    font: 500 11px var(--font);
    padding: 4px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: filter var(--dur-hover);
  }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-primary:active { filter: brightness(0.92); }

  .btn-icon {
    background: none;
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    color: var(--text2);
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background var(--dur-hover), color var(--dur-hover);
  }
  .btn-icon:hover { background: var(--bg4); color: var(--text); }
  .btn-icon[aria-pressed="true"] { color: var(--accent-bright); }
  .btn-icon svg { width: 14px; height: 14px; }

  /* 空状態（結果リスト・カラム・プレビューで共用） */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--sp-2);
    padding: 32px 16px;
    text-align: center;
  }
  .empty-icon svg { width: 24px; height: 24px; color: var(--text3); }
  .empty-title { font-size: 12px; color: var(--text2); }
  .empty-hint {
    font-size: 11px;
    color: var(--text3);
    display: flex; align-items: center; justify-content: center;
    gap: 4px; flex-wrap: wrap;
  }

  /* キーボード操作のフォーカスリング */
  button:focus-visible,
  [tabindex]:focus-visible {
    outline: 2px solid var(--accent-bright);
    outline-offset: -2px;
  }

  /* ═══════════════════════════════════════
     SECTION S2: タイトルバー・検索
  ═══════════════════════════════════════ */
  .titlebar {
    height: 36px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    flex-shrink: 0;
    -webkit-app-region: drag;
    position: relative;
  }

  .titlebar-logo {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 14px;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }
  .logo-mark { width: 20px; height: 20px; flex-shrink: 0; }
  .logo-name { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.01em; }

  .titlebar-menu {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    overflow: hidden;
    -webkit-app-region: no-drag;
  }
  .menu-btn {
    background: none;
    border: none;
    color: var(--text2);
    font: 400 12px var(--font);
    padding: 0 10px;
    height: 36px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background var(--dur-hover), color var(--dur-hover);
  }
  .menu-btn:hover { background: var(--bg4); color: var(--text); }

  .menu-hamburger {
    display: none;
    background: none;
    border: none;
    color: var(--text2);
    padding: 0 11px;
    height: 36px;
    cursor: pointer;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
    transition: background var(--dur-hover), color var(--dur-hover);
  }
  .menu-hamburger:hover { background: var(--bg4); color: var(--text); }
  .menu-hamburger span {
    display: block;
    width: 14px; height: 1.5px;
    background: currentColor;
    border-radius: 1px;
  }

  .menu-dropdown {
    display: none;
    position: fixed;
    top: 36px; left: 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--r-md) var(--r-md);
    z-index: 1000;
    min-width: 140px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    flex-direction: column;
  }
  .menu-dropdown.open { display: flex; }
  .menu-dropdown .menu-btn { width: 100%; text-align: left; padding: 0 16px; }

  /* 検索ボックス（中央固定・デモのトリガー） */
  .titlebar-search-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    -webkit-app-region: no-drag;
    pointer-events: none;
  }
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 0 10px;
    gap: 6px;
    width: 400px;
    overflow: hidden;
    transition: border-color 150ms, box-shadow 150ms;
    pointer-events: all;
  }
  .search-wrap:hover { border-color: #444c56; }
  .search-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(49,109,202,0.25);
  }
  .search-icon { color: var(--text3); flex-shrink: 0; display: flex; }
  .search-icon svg { width: 13px; height: 13px; }
  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font: 400 13px var(--font);
    padding: 5px 0;
    user-select: text;
    min-width: 0;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-kbd { flex-shrink: 0; display: flex; gap: 3px; }

  /* 検索中インジケータ（下端2pxのスイープバー。旧 opacity:.7 は廃止） */
  .search-loadbar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-bright), transparent);
    transform: translateX(-100%);
    opacity: 0;
    pointer-events: none;
  }
  .search-wrap.loading .search-loadbar {
    opacity: 1;
    animation: search-sweep 1s linear infinite;
  }

  /* ウィンドウコントロール */
  .titlebar-winctrls {
    margin-left: auto;
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }
  .winctrl {
    background: none;
    border: none;
    color: var(--text2);
    width: 46px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--dur-hover), color var(--dur-hover);
  }
  .winctrl:hover { background: var(--bg4); color: var(--text); }
  .winctrl.close:hover { background: #c42b1c; color: #fff; }
  .winctrl svg { pointer-events: none; }

  /* ═══════════════════════════════════════
     SECTION S3: ツールバー・3ペインレイアウト・リサイザー
  ═══════════════════════════════════════ */
  .toolbar {
    height: 34px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    padding: 0 var(--sp-3);
    flex-shrink: 0;
  }
  .toolbar-label { color: var(--text3); font-size: 11px; white-space: nowrap; }
  .path-input {
    flex: 0 1 420px;
    min-width: 120px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 4px 8px;
    font: 400 11px var(--font);
    color: var(--text2);
    outline: none;
    user-select: text;
    transition: border-color var(--dur-hover);
  }
  .path-input:hover { border-color: #444c56; }
  .path-input:focus { border-color: var(--accent); color: var(--text); }
  .toolbar-spacer { flex: 1; }

  .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  .left-pane {
    width: var(--left-w);
    min-width: 240px;
    max-width: 36vw;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .preview-pane {
    width: var(--right-w);
    min-width: 300px;
    max-width: 42vw;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body.preview-collapsed .preview-pane,
  body.preview-collapsed #resizerR { display: none; }

  .resizer {
    width: 4px;
    flex-shrink: 0;
    background: transparent;
    cursor: col-resize;
    z-index: 10;
    transition: background 150ms;
  }
  .resizer:hover, .resizer.dragging { background: var(--accent); }

  /* ═══════════════════════════════════════
     SECTION S4: 左ペイン結果リスト
  ═══════════════════════════════════════ */
  /* リストヘッダー：行の列幅と揃える（score 56px / name flex / size 52px / date 70px） */
  .list-header {
    display: flex;
    align-items: center;
    height: 26px;
    padding: 0 var(--sp-3);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
  }

  .col-h {
    display: flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    padding: 0;
    margin: 0;
    font: inherit;
    color: inherit;
    cursor: pointer;
    transition: color var(--dur-hover);
  }
  .col-h:hover { color: var(--text); }
  .col-h.sorted { color: var(--text2); }

  .col-h-score { width: 56px; margin-right: var(--sp-2); justify-content: flex-end; }
  .col-h-name  { flex: 1; min-width: 0; }
  .col-h-size,
  .col-h-date  { display: none; justify-content: flex-end; }
  .left-pane.w-md .col-h-size { display: flex; width: 52px; }
  .left-pane.w-lg .col-h-date { display: flex; width: 70px; }

  .sort-ico {
    display: inline-flex;
    width: 8px;
    height: 8px;
    flex-shrink: 0;
    transition: transform 120ms var(--ease-out);
  }
  .sort-ico svg { width: 8px; height: 8px; }
  .col-h.sorted.desc .sort-ico { transform: rotate(180deg); }

  /* ファイルリスト */
  .file-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .file-list::-webkit-scrollbar { width: 6px; }
  .file-list::-webkit-scrollbar-track { background: transparent; }
  .file-list::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }

  .file-row {
    position: relative;
    display: flex;
    align-items: center;
    height: 40px;
    flex-shrink: 0;
    padding: 0 var(--sp-3);
    cursor: pointer;
    transition:
      opacity var(--dur-enter) var(--ease-out),
      transform var(--dur-enter) var(--ease-out),
      background var(--dur-hover);
  }

  /* 行の入場アニメーション */
  .file-row.pre {
    opacity: 0;
    transform: translateY(4px);
  }

  /* 左端ヒートバー：ヒートマップ色をJSが --heat-bg に注入 */
  .row-heatbar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--heat-bg, transparent);
    opacity: 0.9;
  }

  /* 一致スコア列 */
  .row-score {
    flex-shrink: 0;
    width: 56px;
    margin-right: var(--sp-2);
  }
  .row-score-num {
    display: block;
    font-size: 11px;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .row-score-bar {
    height: 3px;
    width: 100%;
    margin-top: 3px;
    background: var(--bg4);
    border-radius: 2px;
    overflow: hidden;
  }
  .row-score-fill {
    height: 100%;
    background: var(--heat-bg, var(--accent));
    transform-origin: left;
    border-radius: 2px;
  }

  /* 名前・フォルダ（2行構成） */
  .row-main { flex: 1; min-width: 0; }
  .row-name { display: flex; align-items: center; gap: 6px; overflow: hidden; }
  .row-file {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row-folder {
    margin-top: 1px;
    font-size: 10px;
    color: var(--text3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* サイズ・更新日時（ペイン幅に応じて表示） */
  .row-size,
  .row-date {
    display: none;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .left-pane.w-md .row-size { display: block; width: 52px; }
  .left-pane.w-lg .row-date { display: block; width: 70px; }

  /* 状態 */
  .file-row:hover { background: var(--hover-bg); }
  .file-row.selected { background: var(--sel-bg); }
  .file-row.selected:hover { background: var(--sel-bg-hover); }
  .file-row.selected .row-heatbar { background: var(--accent-bright); }
  .file-row.selected .row-file { color: #fff; }
  .file-row:active { background: rgba(49,109,202,0.18); }
  .file-row:focus-visible {
    outline: 2px solid var(--accent-bright);
    outline-offset: -2px;
  }

  /* スケルトン行（ロード中） */
  .sk-row {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    height: 40px;
    flex-shrink: 0;
    padding: 0 var(--sp-3);
  }
  .sk-block {
    position: relative;
    overflow: hidden;
    background: var(--bg3);
    border-radius: 4px;
  }
  .sk-score { width: 40px; height: 10px; }
  .sk-badge { width: 26px; height: 16px; }
  .sk-line  { flex: 1; height: 10px; }

  /* シマーアニメーション */
  .sk-block::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(177,186,196,0.08), transparent);
    transform: translateX(-100%);
    animation: sk-shimmer 1.2s infinite;
  }
  @keyframes sk-shimmer {
    to { transform: translateX(200%); }
  }

  /* ═══════════════════════════════════════
     SECTION S5: 中央カラムエクスプローラー＋ヒートマップ
  ═══════════════════════════════════════ */
  .center-pane {
    flex: 1;
    min-width: 280px;
    display: flex;
    overflow: hidden;
    background: var(--bg);
  }

  .columns-scroll {
    flex: 1;
    display: flex;
    gap: var(--sp-2);
    padding: var(--sp-3);
    overflow-x: auto;
    overflow-y: hidden;
  }
  .columns-scroll::-webkit-scrollbar { height: 6px; }
  .columns-scroll::-webkit-scrollbar-track { background: transparent; }
  .columns-scroll::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }

  /* カラムパネル */
  .col-panel {
    flex-shrink: 0;
    width: 208px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg2);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-md);
    transition:
      opacity var(--dur-panel) var(--ease-out),
      transform var(--dur-panel) var(--ease-out);
  }
  .col-panel.pre {
    opacity: 0;
    transform: translateX(-12px);
  }
  .col-panel.in {
    opacity: 1;
    transform: none;
  }

  /* カラムヘッダー */
  .col-head {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border-subtle);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    flex-shrink: 0;
  }
  .col-depth {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border-radius: 4px;
    background: var(--bg4);
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    flex-shrink: 0;
  }
  .col-head-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* カラム本体 */
  .col-body {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .col-body::-webkit-scrollbar { width: 4px; }
  .col-body::-webkit-scrollbar-track { background: transparent; }
  .col-body::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 2px; }

  /* カラムアイテム */
  .col-item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
    height: 28px;
    padding: 0 10px;
    cursor: pointer;
    transition:
      opacity var(--dur-enter) var(--ease-out),
      transform var(--dur-enter) var(--ease-out);
  }

  /* 入場アニメーション（transition-delayはJSが注入） */
  .col-item.pre {
    opacity: 0;
    transform: translateX(-8px);
  }
  .col-item.in {
    opacity: 1;
    transform: none;
  }

  /* ヒートマップ背景オーバーレイ：z-index:0（最背面）。
     スコア → 輝度は JS の heatBg() が hsl(220,80%, 20%+score*60%) で算出 */
  .heat-overlay {
    position: absolute;
    inset: 0;
    z-index: 0;
    background: var(--heat-bg, transparent);
    opacity: calc(var(--heat-opacity, 0) * var(--heat-alpha-max));
    transition: opacity var(--dur-panel) var(--ease-out);
    pointer-events: none;
  }

  /* hover層：z-index:1。ヒート点灯済みでもhoverを視認できるよう疑似要素で重ねる */
  .col-item::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    background: transparent;
    pointer-events: none;
    transition: background var(--dur-hover);
  }
  .col-item:hover::after {
    background: rgba(255,255,255,0.055);
  }

  /* 左端ヒートバー：面のopacityでは潰れる低スコア帯をフル彩度の輝度差で判別させる */
  .item-heatbar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    z-index: 2;
    width: 2px;
    background: var(--heat-bg, transparent);
    opacity: calc(var(--heat-opacity, 0) * 0.9);
  }

  /* コンテンツ：z-index:2（最前面） */
  .col-icon,
  .col-name,
  .col-chevron,
  .col-score,
  .col-connector {
    position: relative;
    z-index: 2;
  }

  .col-icon {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    color: var(--text2);
  }
  .col-icon svg { width: 13px; height: 13px; }
  .col-item .col-icon.ico-folder { color: var(--folder); }
  .col-item .col-icon.ico-code   { color: var(--c-tsx); }

  .col-name {
    flex: 1;
    min-width: 0;
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .col-chevron {
    flex-shrink: 0;
    color: var(--text3);
    display: flex;
  }
  .col-chevron svg { width: 10px; height: 10px; }

  /* スコアpill：found のみ。フル不透明背景＋輝度に応じた2値文字色で可読性を確保 */
  .col-score {
    flex-shrink: 0;
    padding: 1px 6px;
    border-radius: var(--r-pill);
    background: var(--heat-bg, var(--bg4));
    color: var(--heat-text, var(--text2));
    font-size: 10px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    transition:
      opacity var(--dur-enter) var(--ease-out),
      transform var(--dur-enter) var(--ease-out);
  }
  .col-score.pre {
    opacity: 0;
    transform: scale(0.8);
  }

  /* アクティブパスのコネクタ：active時のみ表示 */
  .col-connector {
    display: none;
    flex-shrink: 0;
    color: var(--accent-bright);
    filter: drop-shadow(0 0 3px rgba(88,166,255,0.8));
  }
  .col-connector svg { width: 10px; height: 10px; }
  .col-item.active .col-connector { display: flex; }

  /* 状態 */
  .col-item.active {
    box-shadow: inset 2px 0 0 var(--accent-bright), inset 0 0 0 1px rgba(88,166,255,0.35);
  }
  .col-item.active .col-name {
    color: #fff;
    font-weight: 500;
  }

  .col-item.skip {
    cursor: default;
  }
  .col-item.skip .col-icon,
  .col-item.skip .col-name,
  .col-item.skip .col-chevron {
    opacity: 0.55;
  }
  .col-item.skip .col-chevron {
    display: none;
  }

  .col-item:focus-visible {
    outline: 2px solid var(--accent-bright);
    outline-offset: -2px;
  }

  /* AIガイドパスライン：確定パス選択時に発光 */
  .guide-path-glow {
    height: 2px;
    margin: 4px 10px 6px;
    border-radius: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent-bright), var(--accent));
    box-shadow: 0 0 6px 1px var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 320ms var(--ease-out);
  }
  .guide-path-glow.on {
    transform: scaleX(1);
    animation: glow-pulse 600ms ease-out 1;
  }
  @keyframes glow-pulse {
    0%   { box-shadow: 0 0 14px 3px var(--accent-bright); }
    100% { box-shadow: 0 0 6px 1px var(--accent); }
  }

  /* ═══════════════════════════════════════
     SECTION S6: プレビューペイン
  ═══════════════════════════════════════ */
  .preview-header {
    display: flex;
    gap: var(--sp-2);
    align-items: flex-start;
    padding: 10px 12px 6px;
    flex-shrink: 0;
  }
  .preview-title { flex: 1; min-width: 0; }
  .preview-filename {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    word-break: break-all;
  }
  .preview-path {
    margin-top: 2px;
    font-size: 10px;
    color: var(--text3);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .preview-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 12px 10px;
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .meta-chip {
    display: flex; align-items: center; gap: 5px;
    background: var(--bg3);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-pill);
    padding: 2px 8px;
  }
  .meta-k { font-size: 10px; color: var(--text3); }
  .meta-v { font-size: 11px; color: var(--text2); font-variant-numeric: tabular-nums; }
  .score-pill {
    background: var(--heat-bg, var(--bg4));
    color: var(--heat-text, var(--text2));
    border-radius: var(--r-pill);
    padding: 0 6px;
    font-size: 10px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* AIガイド表示（score >= 0.8 のファイルのみ） */
  .preview-guide {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px 0;
    color: var(--accent-bright);
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .preview-guide svg {
    width: 12px; height: 12px;
    filter: drop-shadow(0 0 3px rgba(88,166,255,0.6));
    flex-shrink: 0;
  }
  .preview-guide .guide-line {
    flex: 1;
    height: 2px;
    border-radius: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent-bright), transparent);
    box-shadow: 0 0 6px rgba(49,109,202,0.6);
  }

  .preview-body {
    flex: 1;
    overflow: auto;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }
  .preview-body::-webkit-scrollbar { width: 6px; height: 6px; }
  .preview-body::-webkit-scrollbar-track { background: transparent; }
  .preview-body::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }

  /* プレビュー内容の入れ替えフェード（header〜truncバナーまでを縦flexで包む） */
  .pv-view {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    opacity: 1;
    transition: opacity 160ms var(--ease-out);
  }
  .pv-view.pre { opacity: 0; }

  /* コードビュー */
  .pv-code {
    font: 12px/1.6 var(--font-mono);
    padding: 8px 0;
    user-select: text;
  }
  .pv-line { display: flex; }
  .pv-line:hover { background: rgba(177,186,196,0.04); }
  .pv-ln {
    width: 40px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 12px;
    color: var(--text3);
    user-select: none;
    font-variant-numeric: tabular-nums;
    position: sticky;
    left: 0;
    background: var(--bg);
  }
  .pv-tx { white-space: pre; padding-right: 16px; }

  /* 簡易シンタックスハイライト（GitHub Dark 準拠・全色 bg 上 4.5:1 以上） */
  .tok-kw   { color: #ff7b72; }
  .tok-str  { color: #a5d6ff; }
  .tok-fn   { color: #d2a8ff; }
  .tok-num  { color: #79c0ff; }
  .tok-type { color: #ffa657; }
  .tok-cm   { color: #8b949e; font-style: italic; }

  /* Markdownビュー（レンダリング済みHTMLを静的表示） */
  .pv-md {
    padding: 14px 16px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
    user-select: text;
  }
  .pv-md h1 {
    font-size: 16px; font-weight: 600;
    border-bottom: 1px solid var(--border-subtle);
    padding-bottom: 6px;
    margin-bottom: 10px;
  }
  .pv-md h2 { font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
  .pv-md p { margin: 6px 0; color: var(--text2); }
  .pv-md ul { padding-left: 18px; margin: 6px 0; color: var(--text2); }
  .pv-md li { margin: 3px 0; }
  .pv-md strong { color: var(--text); }
  .pv-md code {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--bg3);
    border: 1px solid var(--border-subtle);
    border-radius: 3px;
    padding: 0 4px;
    color: var(--text);
  }
  .pv-md pre {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--bg2);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-md);
    padding: 10px 12px;
    margin: 8px 0;
    overflow-x: auto;
    color: var(--text);
    white-space: pre;
  }

  /* 非対応形式 */
  .pv-format { font-family: var(--font-mono); color: var(--text3); font-size: 11px; }

  /* truncated バナー（backend.md §6: 先頭64KBのみ） */
  .preview-trunc {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: rgba(210,153,34,0.12);
    border-top: 1px solid rgba(210,153,34,0.4);
    color: var(--warn);
    font-size: 11px;
    flex-shrink: 0;
  }
  .preview-trunc svg { width: 12px; height: 12px; flex-shrink: 0; }

  /* プレビューローディング（選択デバウンス150msの間に表示） */
  .pv-skel {
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .pv-skel .sk-block { height: 10px; }

  /* ═══════════════════════════════════════
     SECTION S7: ステータスバー
  ═══════════════════════════════════════ */
  .statusbar {
    height: 24px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 10px;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text3);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
    transition: background 200ms;
  }
  .status-dot.loading { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
  .status-phase { color: var(--text2); white-space: nowrap; }
  .status-note { color: var(--text3); white-space: nowrap; }

  .status-log {
    font: 10px/1 var(--font-mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .status-log .entry { display: inline-block; transition: opacity var(--dur-exit) var(--ease-out), transform var(--dur-exit) var(--ease-out); }
  .status-log .entry.pre { opacity: 0; transform: translateY(3px); }
  .log-open  { color: var(--accent-bright); }
  .log-skip  { color: var(--text3); }
  .log-found { color: var(--success); }
  .log-info  { color: var(--text2); }

  .status-spacer { flex: 1; }
  .status-counts { white-space: nowrap; color: var(--text3); }
  .status-counts b { color: var(--text2); font-weight: 500; font-variant-numeric: tabular-nums; }
  .status-ms {
    font-variant-numeric: tabular-nums;
    color: var(--text2);
    min-width: 48px;
    text-align: right;
    white-space: nowrap;
  }
  .status-hints { display: flex; gap: 10px; white-space: nowrap; align-items: center; }
  .status-hints .hint { display: flex; gap: 3px; align-items: center; }

  /* ═══════════════════════════════════════
     SECTION S8: keyframes・補足・reduced-motion
  ═══════════════════════════════════════ */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }
  @keyframes search-sweep {
    to { transform: translateX(100%); }
  }

  /* ソート対象外の列は矢印を隠す（S4補足） */
  .col-h:not(.sorted) .sort-ico { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>

/* ═══════════════════════════════════════

/* SVGアイコンセット（16pxグリッド・currentColor・stroke 1.5 統一） */
const ICONS = {
  folder: `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 2A1.75 1.75 0 0 0 0 3.75v8.5C0 13.216.784 14 1.75 14h12.5A1.75 1.75 0 0 0 16 12.25v-7.5A1.75 1.75 0 0 0 14.25 3H7.81a.25.25 0 0 1-.177-.073L6.323 1.616A1.75 1.75 0 0 0 5.085 1H1.75ZM1.5 3.75a.25.25 0 0 1 .25-.25h3.335a.25.25 0 0 1 .177.073l1.31 1.311c.329.329.775.514 1.24.516H14.25a.25.25 0 0 1 .25.25v7.5a.25.25 0 0 1-.25.25H1.75a.25.25 0 0 1-.25-.25v-8.5Z"/></svg>`,

  fileText: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 1.5h6L13 5v9a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5v-12a.5.5 0 0 1 .5-.5Z"/><path d="M9.5 1.5V5h3.5"/><path d="M5 8h5"/><path d="M5 10.25h5"/><path d="M5 12.5h3"/></svg>`,

const statusMs     = $('statusMs');
const statusHints  = $('statusHints');
const searchInput = $('searchInput');
const searchWrap  = $('searchWrap');
const searchKbd   = $('searchKbd');

/* CSSの0.01ms化だけではJS駆動のタイムラインに効かないため、JS側でも分岐する */
const RM = window.matchMedia('(prefers-reduced-motion: reduce)');

const state = {
  hasResults: false,
  selectedId: null,
  sortCol: 'score',
  sortAsc: false,
  files: FILES.slice(),
};

/* ヒートマップ色: hsl(220,80%, 20%+score*60%)（frontend.md §2 準拠） */
function heatBg(score) { return `hsl(220, 80%, ${(20 + score * 60).toFixed(1)}%)`; }
/* スコアpill文字色: 背景輝度に応じた2値切替（0.6以上は明背景→黒文字で 4.5:1 以上を確保） */
function heatText(score) { return score >= 0.6 ? '#0d1117' : '#e6edf3'; }

function setHeat(el, score, heatState) {
  const op = heatState === 'skipped' ? score * 0.5 : score; // skipped は減衰して「見えるが掘られない」
  el.style.setProperty('--heat-bg', heatBg(score));
  el.style.setProperty('--heat-opacity', op.toFixed(3));
  el.style.setProperty('--heat-text', heatText(score));
}

const KNOWN_EXT = ['tsx', 'ts', 'css', 'md', 'json', 'rs', 'toml'];
function extBadge(ext) {
  const cls = KNOWN_EXT.includes(ext) ? 'ext-' + ext : 'ext-other';
  return `<span class="ext-badge ${cls}">${ext.slice(0, 4).toUpperCase()}</span>`;
}
const CODE_EXT = ['tsx', 'ts', 'jsx', 'js', 'css', 'rs', 'toml', 'json'];
function fileIconFor(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (CODE_EXT.includes(ext)) return `<span class="col-icon ico-code">${ICONS.fileCode}</span>`;
  if (ext === 'md' || ext === 'txt') return `<span class="col-icon">${ICONS.fileText}</span>`;
  return `<span class="col-icon">${ICONS.fileGeneric}</span>`;
}

/* ── 空状態 ── */
const EMPTY_RESULTS = `
  <div class="empty-state">
    <div class="empty-icon">${ICONS.search}</div>
    <div class="empty-title">検索キーワードを入力してください</div>
    <div class="empty-hint"><kbd>Ctrl</kbd><kbd>K</kbd> で検索 / <kbd>Enter</kbd> で実行</div>
  </div>`;
const EMPTY_COLUMNS = `
  <div class="empty-state">
    <div class="empty-icon">${ICONS.spark}</div>
    <div class="empty-title">検索を実行するとA*探索の過程を表示します</div>
    <div class="empty-hint"><kbd>Enter</kbd> デモ再生</div>
  </div>`;
const EMPTY_PREVIEW = `
  <div class="empty-state">
    <div class="empty-icon">${ICONS.fileText}</div>
    <div class="empty-title">ファイルを選択するとプレビューを表示します</div>
    <div class="empty-hint"><kbd>↑</kbd><kbd>↓</kbd> で選択を移動</div>

/* ── 結果リスト ── */
function buildRow(f) {
  const row = document.createElement('div');
  row.className = 'file-row';
  row.tabIndex = 0;
  row.dataset.id = f.id;
  row.setAttribute('role', 'option');
  row.innerHTML =
    `<span class="row-heatbar"></span>` +
    `<div class="row-score"><span class="row-score-num">${f.score.toFixed(2)}</span>` +
    `<div class="row-score-bar"><div class="row-score-fill" style="transform:scaleX(${f.score})"></div></div></div>` +
    `<div class="row-main"><div class="row-name">${extBadge(f.ext)}<span class="row-file">${f.name}</span></div>` +
    `<div class="row-folder">${f.folder}</div></div>` +
    `<div class="row-size">${f.size}</div><div class="row-date">${f.date}</div>`;
  row.style.setProperty('--heat-bg', heatBg(f.score));
  row.addEventListener('click', () => selectFile(f.id));
  return row;
}

function renderResults(opts = {}) {
  fileList.innerHTML = '';
  state.hasResults = true;
  const frag = document.createDocumentFragment();
  state.files.forEach(f => frag.appendChild(buildRow(f)));
  fileList.appendChild(frag);
  const rows = [...fileList.children];
  if (opts.stagger && !RM.matches) {
    rows.forEach((r, i) => { r.classList.add('pre'); r.style.transitionDelay = (i * 30) + 'ms'; });
    // 挿入直後に再フローを強制し、クラス除去を確実にトランジションとして発火させる
    void fileList.offsetWidth;
    rows.forEach(r => r.classList.remove('pre'));
    // hover背景の遷移にdelayが残らないよう入場後に除去
    setTimeout(() => rows.forEach(r => { r.style.transitionDelay = ''; }), rows.length * 30 + 400);
  }
  if (state.selectedId) {
    const sel = fileList.querySelector(`[data-id="${state.selectedId}"]`);
    if (sel) sel.classList.add('selected');
  }
}

function renderSkeleton() {
  state.hasResults = false;
  const widths = [72, 55, 80, 48, 64, 70];
  fileList.innerHTML = widths.map(w =>
    `<div class="sk-row"><span class="sk-block sk-score"></span><span class="sk-block sk-badge"></span>` +
    `<span class="sk-block sk-line" style="flex:0 0 ${w}%"></span></div>`).join('');
}

/* ── カラムエクスプローラー ── */
function buildColumn(col, idx, animate) {
  const panel = document.createElement('div');
  panel.className = 'col-panel ' + (animate ? 'pre' : 'in');
  panel.innerHTML =
    `<div class="col-head"><span class="col-depth">${idx + 1}</span><span class="col-head-label">${col.label}</span></div>`;
  const body = document.createElement('div');
  body.className = 'col-body';
  col.items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'col-item ' + (animate ? 'pre' : 'in');
    el.tabIndex = 0;
    if (item.fileId) el.dataset.fileId = item.fileId;
    const icon = item.type === 'folder'
      ? `<span class="col-icon ico-folder">${ICONS.folder}</span>`
      : fileIconFor(item.name);
    el.innerHTML =
      `<div class="heat-overlay"></div><span class="item-heatbar"></span>` + icon +
      `<span class="col-name">${item.name}</span>` +
      (item.type === 'folder' ? `<span class="col-chevron">${ICONS.chevronRight}</span>` : '') +
      (item.state === 'found' ? `<span class="col-score${animate ? ' pre' : ''}">${item.score.toFixed(2)}</span>` : '') +
      `<span class="col-connector">${ICONS.arrowRight}</span>`;
    if (!animate) {
      if (item.state === 'skipped') el.classList.add('skip');
      if (item.onPath) el.classList.add('active');
      setHeat(el, item.score, item.state);
    }
    if (item.type === 'file') el.addEventListener('click', () => selectFile(item.fileId));
    body.appendChild(el);
  });
  // ガイドパスライン（最終カラムの found 一覧の下端）
  if (idx === COLUMNS.length - 1) {
    const glow = document.createElement('div');
    glow.className = 'guide-path-glow';
    body.appendChild(glow);
  }
  panel.appendChild(body);
  return panel;
}

function addColumn(idx, animate) {
  const panel = buildColumn(COLUMNS[idx], idx, animate);
  columnsScroll.appendChild(panel);
  if (animate) {
    const items = [...panel.querySelectorAll('.col-item')];
    // 挿入直後に再フローを強制してからクラスを外し、transform/opacity の遷移として点灯させる
    void panel.offsetWidth;
    panel.classList.remove('pre'); panel.classList.add('in');
    items.forEach((el, i) => {
      el.style.transitionDelay = (i * 40) + 'ms';
      el.classList.remove('pre'); el.classList.add('in');
      const item = COLUMNS[idx].items[i];
      if (item.state !== 'skipped') setHeat(el, item.score, item.state); // skipped はログ時に点灯
      const pill = el.querySelector('.col-score');
      if (pill) { pill.style.transitionDelay = (i * 50 + 150) + 'ms'; pill.classList.remove('pre'); }
    });
    // 入場後は hover 遷移に delay が残らないよう除去
    setTimeout(() => items.forEach(el => {
      el.style.transitionDelay = '';
      const pill = el.querySelector('.col-score');
      if (pill) pill.style.transitionDelay = '';
    }), 800);
  }
  columnsScroll.scrollLeft = columnsScroll.scrollWidth;
  return panel;
}

function renderColumnsFinal() {
  columnsScroll.innerHTML = '';
  COLUMNS.forEach((c, i) => addColumn(i, false));
  const glow = columnsScroll.querySelector('.guide-path-glow');
  if (glow) glow.classList.add('on');
}

function markSkip(colIdx, itemIdx) {
  const panel = columnsScroll.children[colIdx];
  if (!panel) return;
  const el = panel.querySelectorAll('.col-item')[itemIdx];
  if (!el) return;
  el.classList.add('skip');
  setHeat(el, COLUMNS[colIdx].items[itemIdx].score, 'skipped');
}

/* 確定パスの連鎖点灯（80ms間隔）→ 末尾でガイドラインが発光 */
function lightPath() {
  COLUMNS.forEach((col, ci) => {
    const ii = col.items.findIndex(it => it.onPath);
    if (ii < 0) return;
    schedule(ci * 80, () => {
      const panel = columnsScroll.children[ci];
      const el = panel && panel.querySelectorAll('.col-item')[ii];
      if (el) el.classList.add('active');
    });
  });
  schedule(COLUMNS.length * 80 + 80, () => {
    const glow = columnsScroll.querySelector('.guide-path-glow');
    if (glow) glow.classList.add('on');
  });
}

/* ── プレビュー ── */
let previewTimer = null;

function selectFile(id, instant) {
  state.selectedId = id;
  fileList.querySelectorAll('.file-row').forEach(r =>
    r.classList.toggle('selected', r.dataset.id === id));
  // 最終カラムの active / ガイドラインを選択と同期
  const lastPanel = columnsScroll.children[COLUMNS.length - 1];
  const f = FILES.find(x => x.id === id);
  if (lastPanel && lastPanel.classList.contains('col-panel')) {
    lastPanel.querySelectorAll('.col-item').forEach(el =>
      el.classList.toggle('active', el.dataset.fileId === id));
    const glow = lastPanel.querySelector('.guide-path-glow');
    if (glow) glow.classList.toggle('on', !!f && f.score >= 0.8); // AIガイドは score>=0.8 のみ
  }
  clearTimeout(previewTimer);
  if (instant || RM.matches) { renderPreview(id, true); return; }
  // 選択デバウンス模擬（backend.md §6: 100〜150ms）。連続選択は前回タイマーをキャンセル
  previewPane.innerHTML = `<div class="pv-skel">` +
    [90, 75, 85, 60, 80, 70, 40].map(w => `<span class="sk-block" style="width:${w}%"></span>`).join('') +
    `</div>`;
  previewTimer = setTimeout(() => renderPreview(id, false), 150);
}

function renderPreview(id, instant) {
  const f = FILES.find(x => x.id === id);
  const pv = PREVIEWS[id];
  if (!f || !pv) { previewPane.innerHTML = EMPTY_PREVIEW; return; }
  const fullPath = 'C:\\' + f.folder + '\\' + f.name;

  let bodyHtml;
  if (pv.type === 'code') {
    bodyHtml = `<div class="pv-code">` + pv.lines.map((l, i) =>
      `<div class="pv-line"><span class="pv-ln">${i + 1}</span><span class="pv-tx">${l}</span></div>`).join('') +
      `</div>`;
  } else if (pv.type === 'markdown') {
    bodyHtml = `<div class="pv-md">${pv.html}</div>`;
  } else {
    bodyHtml = `<div class="empty-state"><div class="empty-icon">${ICONS.fileGeneric}</div>` +
      `<div class="empty-title">プレビュー非対応の形式です</div>` +
      `<div class="empty-hint"><span class="pv-format">${pv.format} — ${pv.note}</span></div></div>`;
  }
  const guideHtml = f.score >= 0.8
    ? `<div class="preview-guide">${ICONS.spark}<span>AIガイド: 高一致ルート</span><span class="guide-line"></span></div>`
    : '';
  const truncHtml = pv.truncated
    ? `<div class="preview-trunc">${ICONS.warning}<span>先頭 64KB のみ表示しています（全体 ${f.size}）</span></div>`
    : '';
  const scoreStyle = `--heat-bg:${heatBg(f.score)};--heat-text:${heatText(f.score)}`;

  previewPane.innerHTML =
    `<div class="pv-view${instant ? '' : ' pre'}">` +
      `<div class="preview-header">${extBadge(f.ext)}<div class="preview-title">` +
        `<div class="preview-filename">${f.name}</div>` +
        `<div class="preview-path" title="${fullPath}">${fullPath}</div></div></div>` +
      `<div class="preview-meta">` +
        `<div class="meta-chip"><span class="meta-k">スコア</span><span class="score-pill" style="${scoreStyle}">${f.score.toFixed(2)}</span></div>` +
        `<div class="meta-chip"><span class="meta-k">サイズ</span><span class="meta-v">${f.size}</span></div>` +
        `<div class="meta-chip"><span class="meta-k">更新</span><span class="meta-v">${f.date}</span></div>` +
        `<div class="meta-chip"><span class="meta-k">形式</span><span class="meta-v">${f.ext}</span></div>` +
      `</div>` +
      guideHtml +
      `<div class="preview-body">${bodyHtml}</div>` +
      truncHtml +
    `</div>`;
  if (!instant) {
    const view = previewPane.firstElementChild;
    void view.offsetWidth; // 再フロー強制でトランジション発火
    view.classList.remove('pre');
  }
}

/* ── ステータスバー ── */
function setPhase(text) { statusPhase.textContent = text; }
function setNote(text)  { statusNote.textContent = text; }
function setDot(mode)   { statusDot.classList.toggle('loading', mode === 'loading'); }
function setCounts(o, s, f) {
  statusCounts.innerHTML = (o === null) ? '' :
    `展開 <b>${o}</b> ・ スキップ <b>${s}</b> ・ 発見 <b>${f}</b>`;
}
const counts = { o: 0, s: 0, f: 0 };
function bumpCount(key) { counts[key]++; setCounts(counts.o, counts.s, counts.f); }

function logEntry(text, type) {
  const span = document.createElement('span');
  span.className = `entry log-${type} pre`;
  span.textContent = text;
  statusLog.replaceChildren(span);
  void statusLog.offsetWidth; // 再フロー強制でトランジション発火
  span.classList.remove('pre');
}

/* 経過msカウンタ: 実速度<200msに対する意図的スロー再生のためrAFでカウントアップ演出 */
function startMs(duration, target) {
  const t0 = performance.now();
  const tick = now => {
    const p = Math.min((now - t0) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    statusMs.textContent = Math.round(target * ease) + 'ms';
    if (p < 1) demo.raf = requestAnimationFrame(tick);
  };
  demo.raf = requestAnimationFrame(tick);
}

/* ペイン分割リサイザー（左: dx そのまま / 右: dx 符号反転） */
function setupResizer(handle, pane, sign, minW, maxRatio) {
  let startX = 0, startW = 0, active = false;
  handle.addEventListener('mousedown', e => {
    active = true;
    startX = e.clientX;
    startW = pane.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
  });
  document.addEventListener('mousemove', e => {
    if (!active) return;
    const w = Math.min(Math.max(startW + sign * (e.clientX - startX), minW), window.innerWidth * maxRatio);
    pane.style.width = w + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!active) return;
    active = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
  });
}
setupResizer($('resizerL'), leftPane, 1, 240, 0.36);
setupResizer($('resizerR'), previewPane, -1, 300, 0.42);

/* 左ペイン幅に応じてサイズ・日付列の表示を切替 */
new ResizeObserver(entries => {
  const w = entries[0].contentRect.width;
  leftPane.classList.toggle('w-md', w >= 380);
  leftPane.classList.toggle('w-lg', w >= 460);
}).observe(leftPane);

/* ソート */
const headerBtns = document.querySelectorAll('.col-h');
headerBtns.forEach(btn => {
  btn.querySelector('.sort-ico').innerHTML = ICONS.sortArrow;
  btn.addEventListener('click', () => sortBy(btn.dataset.sort));
});
function sortBy(col) {
  if (state.sortCol === col) state.sortAsc = !state.sortAsc;
  else { state.sortCol = col; state.sortAsc = col !== 'score'; } // スコアのみ降順を既定にする
  const dir = state.sortAsc ? 1 : -1;
  state.files.sort((a, b) => {
    let va, vb;
    if (col === 'name')      { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
    else if (col === 'size') { va = a.sizeKB; vb = b.sizeKB; }
    else if (col === 'date') { va = a.date;   vb = b.date; }
    else                     { va = a.score;  vb = b.score; }
    return va < vb ? -dir : va > vb ? dir : 0;
  });
  headerBtns.forEach(b => {
    const on = b.dataset.sort === col;
    b.classList.toggle('sorted', on);
    b.classList.toggle('desc', on && !state.sortAsc);
  });
  if (state.hasResults) renderResults({});
}

/* タイトルバーメニューの縮退（幅不足時はハンバーガーへ） */
const titlebarMenu  = $('titlebarMenu');
const menuHamburger = $('menuHamburger');
const menuDropdown  = $('menuDropdown');
menuHamburger.addEventListener('click', () => menuDropdown.classList.toggle('open'));
document.addEventListener('click', e => {
  if (!menuHamburger.contains(e.target) && !menuDropdown.contains(e.target))
    menuDropdown.classList.remove('open');
});
function checkMenuOverflow() {
  const logo   = document.querySelector('.titlebar-logo');
  const search = document.querySelector('.titlebar-search-center');
  // 検索ボックスは中央固定（absolute）のため、メニューが使えるのは
  // ロゴ右端〜検索ボックス左端の間だけ。全幅からの引き算では重なりを検出できない
  const available = search.getBoundingClientRect().left
                  - logo.getBoundingClientRect().right
                  - 16;
  let totalW = 0;
  // display:none 時に幅0となり判定が振動するため、フォールバック幅80pxで安定化
  titlebarMenu.querySelectorAll('.menu-btn').forEach(b => { totalW += b.getBoundingClientRect().width || 80; });
  if (totalW > available) {
    titlebarMenu.style.display  = 'none';
    menuHamburger.style.display = 'flex';
  } else {
    titlebarMenu.style.display  = 'flex';
    menuHamburger.style.display = 'none';
    menuDropdown.classList.remove('open');
  }
}
new ResizeObserver(checkMenuOverflow).observe(document.querySelector('.titlebar'));

/* プレビュー折りたたみ */
const previewToggle = $('previewToggle');
previewToggle.innerHTML = ICONS.panelRight;
function togglePreview() {
  const collapsed = document.body.classList.toggle('preview-collapsed');
  previewToggle.setAttribute('aria-pressed', String(!collapsed));
}
previewToggle.addEventListener('click', togglePreview);

/* ═══════════════════════════════════════
   SECTION J4: デモタイムラインエンジン
═══════════════════════════════════════ */
const demo = { timers: [], raf: null, running: false };
function schedule(t, fn) { demo.timers.push(setTimeout(fn, t)); }
function cancelDemo() {
  demo.timers.forEach(clearTimeout);
  demo.timers = [];
  if (demo.raf) cancelAnimationFrame(demo.raf);
  demo.raf = null;
  demo.running = false;
  clearTimeout(previewTimer);
  searchWrap.classList.remove('loading');
}

/* デモ再生（実速度<200msの約10倍スロー）。Enter連打は cancelDemo で多重再生を防ぐ */
function runDemo() {
  cancelDemo();
  if (RM.matches) { renderFinal(); return; } // reduced-motion: 最終状態を即時描画
  demo.running = true;
  state.selectedId = null;

  /* t=0: クリア＋Phase 1 */
  columnsScroll.innerHTML = '';
  previewPane.innerHTML = EMPTY_PREVIEW;
  renderSkeleton();
  counts.o = counts.s = counts.f = 0;
  setCounts(0, 0, 0);
  setDot('loading');
  setPhase('Phase 1: Everything 絞り込み…');
  setNote('');
  statusLog.replaceChildren();
  statusMs.textContent = '0ms';
  searchWrap.classList.add('loading');
  startMs(2000, 182);

  schedule(250,  () => logEntry('候補 812件 → 仮想ツリー構築', 'info'));
  schedule(400,  () => { setPhase('Phase 2: A*探索…'); addColumn(0, true); });
  schedule(460,  () => { logEntry('opened   src/   h=0.95', 'open');  bumpCount('o'); });
  schedule(540,  () => { logEntry('skipped  docs/   h=0.30', 'skip'); markSkip(0, 1); bumpCount('s'); });
  schedule(620,  () => { logEntry('skipped  tests/   h=0.12', 'skip'); markSkip(0, 2); bumpCount('s'); });
  schedule(700,  () => { addColumn(1, true); logEntry('opened   components/   h=0.95', 'open'); bumpCount('o'); });
  schedule(780,  () => { logEntry('skipped  utils/   h=0.10', 'skip'); markSkip(1, 2); bumpCount('s'); });
  schedule(1000, () => { addColumn(2, true); logEntry('opened   Button/   h=0.95', 'open'); bumpCount('o'); });
  schedule(1080, () => { logEntry('opened   hooks/   h=0.70', 'open'); bumpCount('o'); });
  schedule(1300, () => addColumn(3, true));
  schedule(1350, () => { logEntry('found    ButtonGroup.tsx   f=0.95', 'found'); bumpCount('f'); });
  schedule(1400, () => { logEntry('found    Button.tsx   f=0.92', 'found'); bumpCount('f'); });
  schedule(1450, () => { logEntry('found    ButtonIcon.tsx   f=0.80', 'found'); bumpCount('f'); });
  schedule(1500, () => { logEntry('found    useButton.ts   f=0.71', 'found'); bumpCount('f'); });
  schedule(1600, () => { renderResults({ stagger: true }); lightPath(); });
  schedule(1650, () => {
    demo.running = false;
    setPhase('完了 — 12件 / 182ms');
    setNote('(デモ: 約10倍スロー)');
    setDot('done');
    setCounts(12, 5, 12);
    searchWrap.classList.remove('loading');
  });
  schedule(1750, () => selectFile('buttongroup'));
}

/* デモ完了後の最終状態を即時描画（初期表示・reduced-motion 用） */
function renderFinal() {
  cancelDemo();
  state.selectedId = 'buttongroup';
  renderResults({});
  renderColumnsFinal();
  setDot('done');
  setPhase('完了 — 12件 / 182ms');
  setNote('');
  logEntry('found    ButtonGroup.tsx   f=0.95', 'found');
  setCounts(12, 5, 12);
  statusMs.textContent = '182ms';
  selectFile('buttongroup', true);
}

/* 空状態へ戻す（Esc） */
function resetToIdle() {
  cancelDemo();
  state.selectedId = null;
  state.hasResults = false;
  fileList.innerHTML = EMPTY_RESULTS;
  columnsScroll.innerHTML = EMPTY_COLUMNS;
  previewPane.innerHTML = EMPTY_PREVIEW;
  setDot('idle');
  setPhase('待機中');
  setNote('');
  statusLog.replaceChildren();
  setCounts(null);
  statusMs.textContent = '';
}

/* ═══════════════════════════════════════
   SECTION J5: キーボード操作・ヒント
═══════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.ctrlKey && (e.key === 'k' || e.key === 'K')) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
    return;
  }
  if (e.ctrlKey && (e.key === 'p' || e.key === 'P')) {
    e.preventDefault();
    togglePreview();
    return;
  }
  if (e.key === 'Escape') {
    if (document.activeElement === searchInput) searchInput.blur();
    resetToIdle();
    return;
  }
  if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && state.hasResults
      && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    const rows = [...fileList.querySelectorAll('.file-row')];
    if (!rows.length) return;
    const cur = rows.findIndex(r => r.dataset.id === state.selectedId);
    const next = e.key === 'ArrowDown'
      ? Math.min(cur + 1, rows.length - 1)
      : Math.max(cur - 1, 0);
    const row = rows[Math.max(next, 0)];
    selectFile(row.dataset.id);
    row.focus();
    row.scrollIntoView({ block: 'nearest' });
  }
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); runDemo(); }
});
$('applyBtn').addEventListener('click', runDemo);

/* 検索ボックスのkbdチップ: フォーカス中は Enter を促す */
searchInput.addEventListener('focus', () => { searchKbd.innerHTML = '<kbd>Enter</kbd>'; });
searchInput.addEventListener('blur',  () => { searchKbd.innerHTML = '<kbd>Ctrl</kbd><kbd>K</kbd>'; });

/* ステータスバー右端のコンテキスト連動ヒント */
function setHints(mode) {
  statusHints.innerHTML = mode === 'list'
    ? '<span class="hint"><kbd>↑</kbd><kbd>↓</kbd> 移動</span><span class="hint"><kbd>Ctrl</kbd><kbd>P</kbd> プレビュー</span>'
    : '<span class="hint"><kbd>Ctrl</kbd><kbd>K</kbd> 検索</span><span class="hint"><kbd>Enter</kbd> デモ再生</span>';
}
document.addEventListener('focusin', e => {
  setHints(e.target.closest && e.target.closest('.file-list') ? 'list' : 'default');
});

/* ═══════════════════════════════════════
   初期化: デモ完了後の状態を静的表示（モックとして全要素を見せる）
═══════════════════════════════════════ */
$('searchIcon').innerHTML = ICONS.search;
setHints('default');
checkMenuOverflow();
renderFinal();
// ?demo 付きで開くと探索デモを自動再生（動作確認用）
if (location.search.includes('demo')) setTimeout(runDemo, 100);
</script>
