<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TreeScout</title>
<!--
  TreeScout UIモック v2 — mock.html のUI/UX改善版
  ・3ペイン構成（結果リスト / カラム探索＋ヒートマップ / プレビュー）
  ・A*探索デモアニメーション（Enterで再生 / Escで中断）
  ・実データ結合なし。デザイントークン・状態表現・モーション仕様のリファレンス
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  /* ═══════════════════════════════════════
     SECTION S1: デザイントークン・リセット・共通部品
  ═══════════════════════════════════════ */
  :root {
    /* サーフェス（GitHub Dark 系・mock.html から継承） */
    --bg:  #0d1117;
    --bg2: #161b22;
    --bg3: #1c2128;
    --bg4: #262c36;
    --bg5: #2d333b;
    --border:        #373e47;
    --border-subtle: #2d333b;

    /* テキスト3階層（bg 上のコントラスト: 16.0 / 6.5 / 4.1 — text3 は補助ラベル専用） */
    --text:  #e6edf3;
    --text2: #9198a1;
    --text3: #6e7681;

    /* アクセント */
    --accent:        #316dca;
    --accent-bright: #58a6ff;
    --sel-bg:        #1c2d3f;
    --sel-bg-hover:  #21344d;
    --sel-border:    #316dca;
    --hover-bg: rgba(177,186,196,0.07);

    /* 意味色 */
    --success: #3fb950;
    --warn:    #d29922;
    --danger:  #f85149;

    /* ヒートマップ: hsl(220,80%, 20%+score*60%) はJS側 heatBg() で算出（frontend.md準拠） */
    --heat-alpha-max: 0.35;

    /* 拡張子カラー */
    --folder:  #c69026;
    --c-tsx:   #58a6ff;
    --c-ts:    #3b82f6;
    --c-css:   #7ee8fa;
    --c-md:    #768390;
    --c-json:  #e3b341;
    --c-rs:    #f07178;
    --c-toml:  #e8b250;
    --c-other: #6e7681;

    /* タイポグラフィ */
    --font: 'Inter', 'Segoe UI', 'Yu Gothic UI', sans-serif;
    --font-mono: ui-monospace, 'Cascadia Code', 'Consolas', monospace;

    /* モーション（exit は enter の約65%） */
    --ease-out: cubic-bezier(0.2, 0, 0, 1);
    --dur-hover: 100ms;
    --dur-enter: 180ms;
    --dur-exit:  120ms;
    --dur-panel: 240ms;

    /* 余白・角丸 */
    --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;  --sp-4: 16px;  --sp-6: 24px;
    --r-sm: 4px;  --r-md: 6px;  --r-pill: 999px;

    /* ペイン幅 */
    --left-w:  320px;
    --right-w: 380px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { color-scheme: dark; }

  body {
    font-family: var(--font);
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* キーボードヒント用チップ */
  kbd {
    font: 500 10px var(--font);
    color: var(--text2);
    background: var(--bg4);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 5px;
  }

  /* 拡張子バッジ */
  .ext-badge {
    flex-shrink: 0;
    width: 26px; height: 18px;
    border-radius: 3px;
    font-size: 8px; font-weight: 700; letter-spacing: 0.02em;
    display: flex; align-items: center; justify-content: center;
  }
  .ext-tsx  { background: rgba(88,166,255,0.18);  color: var(--c-tsx);   border: 1px solid rgba(88,166,255,0.25); }
  .ext-ts   { background: rgba(59,130,246,0.18);  color: var(--c-ts);    border: 1px solid rgba(59,130,246,0.25); }
  .ext-css  { background: rgba(126,232,250,0.14); color: var(--c-css);   border: 1px solid rgba(126,232,250,0.20); }
  .ext-md   { background: rgba(118,131,144,0.18); color: var(--c-md);    border: 1px solid rgba(118,131,144,0.25); }
  .ext-json { background: rgba(227,179,65,0.15);  color: var(--c-json);  border: 1px solid rgba(227,179,65,0.22); }
  .ext-rs   { background: rgba(240,113,120,0.15); color: var(--c-rs);    border: 1px solid rgba(240,113,120,0.22); }
  .ext-toml { background: rgba(232,178,80,0.15);  color: var(--c-toml);  border: 1px solid rgba(232,178,80,0.22); }
  .ext-other{ background: rgba(110,118,129,0.15); color: var(--c-other); border: 1px solid rgba(110,118,129,0.22); }

  /* 共通ボタン */
  .btn-icon {
    background: none;
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    color: var(--text2);
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background var(--dur-hover), color var(--dur-hover);
  }
  .btn-icon:hover { background: var(--bg4); color: var(--text); }
  .btn-icon[aria-pressed="true"] { color: var(--accent-bright); }
  .btn-icon svg { width: 14px; height: 14px; }

  /* 空状態（結果リスト・カラム・プレビューで共用） */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--sp-2);
    padding: 32px 16px;
    text-align: center;
  }
  .empty-icon svg { width: 24px; height: 24px; color: var(--text3); }
  .empty-title { font-size: 12px; color: var(--text2); }
  .empty-hint {
    font-size: 11px;
    color: var(--text3);
    display: flex; align-items: center; justify-content: center;
    gap: 4px; flex-wrap: wrap;
  }

  /* キーボード操作のフォーカスリング */
  button:focus-visible,
  [tabindex]:focus-visible {
    outline: 2px solid var(--accent-bright);
    outline-offset: -2px;
  }

  /* ═══════════════════════════════════════
     SECTION S2: タイトルバー・検索
  ═══════════════════════════════════════ */
  .titlebar {
    height: 36px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    flex-shrink: 0;
    -webkit-app-region: drag;
    position: relative;
  }

  .titlebar-logo {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 14px;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }
  .logo-mark { width: 20px; height: 20px; flex-shrink: 0; }
  .logo-name { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.01em; }

  .titlebar-menu {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    overflow: hidden;
    -webkit-app-region: no-drag;
  }
  .menu-btn {
    background: none;
    border: none;
    color: var(--text2);
    font: 400 12px var(--font);
    padding: 0 10px;
    height: 36px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background var(--dur-hover), color var(--dur-hover);
  }
  .menu-btn:hover { background: var(--bg4); color: var(--text); }

  .menu-hamburger {
    display: none;
    background: none;
    border: none;
    color: var(--text2);
    padding: 0 11px;
    height: 36px;
    cursor: pointer;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
    transition: background var(--dur-hover), color var(--dur-hover);
  }
  .menu-hamburger:hover { background: var(--bg4); color: var(--text); }
  .menu-hamburger span {
    display: block;
    width: 14px; height: 1.5px;
    background: currentColor;
    border-radius: 1px;
  }

  .menu-dropdown {
    display: none;
    position: fixed;
    top: 36px; left: 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--r-md) var(--r-md);
    z-index: 1000;
    min-width: 140px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    flex-direction: column;
  }
  .menu-dropdown.open { display: flex; }
  .menu-dropdown .menu-btn { width: 100%; text-align: left; padding: 0 16px; }

  /* 検索ボックス（中央固定・デモのトリガー） */
  .titlebar-search-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    -webkit-app-region: no-drag;
    pointer-events: none;
  }
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 0 10px;
    gap: 6px;
    width: 400px;
    overflow: hidden;
    transition: border-color 150ms, box-shadow 150ms;
    pointer-events: all;
  }
  .search-wrap:hover { border-color: #444c56; }
  .search-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(49,109,202,0.25);
  }
  .search-icon { color: var(--text3); flex-shrink: 0; display: flex; }
  .search-icon svg { width: 13px; height: 13px; }
  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font: 400 13px var(--font);
    padding: 5px 0;
    user-select: text;
    min-width: 0;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-kbd { flex-shrink: 0; display: flex; gap: 3px; }

  /* 検索中インジケータ（下端2pxのスイープバー。旧 opacity:.7 は廃止） */
  .search-loadbar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-bright), transparent);
    transform: translateX(-100%);
    opacity: 0;
    pointer-events: none;
  }
  .search-wrap.loading .search-loadbar {
    opacity: 1;
    animation: search-sweep 1s linear infinite;
  }

  /* ウィンドウコントロール */
  .titlebar-winctrls {
    margin-left: auto;
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }
  .winctrl {
    background: none;
    border: none;
    color: var(--text2);
    width: 46px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--dur-hover), color var(--dur-hover);
  }
  .winctrl:hover { background: var(--bg4); color: var(--text); }
  .winctrl.close:hover { background: #c42b1c; color: #fff; }
  .winctrl svg { pointer-events: none; }

  /* ═══════════════════════════════════════
     SECTION S3: ツールバー・3ペインレイアウト・リサイザー
  ═══════════════════════════════════════ */
  .toolbar {
    height: 34px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    padding: 0 var(--sp-3);
    flex-shrink: 0;
  }
  /* スコープチップ（現在の検索範囲を表示。既定は全体検索） */
  .scope-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    min-width: 0;
    max-width: 420px;
    height: 22px;
    padding: 0 4px 0 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 11px;
    color: var(--text2);
    font: 400 11px var(--font);
  }
  /* 未指定（全体検索）時は枠線を消して控えめに */
  .scope-chip-all {
    background: transparent;
    border-color: transparent;
    color: var(--text3);
    padding-right: 8px;
  }
  .scope-ico { display: inline-flex; flex-shrink: 0; }
  .scope-ico svg { width: 12px; height: 12px; }
  .scope-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    user-select: text;
  }
  /* チップ内の解除（×）ボタン */
  .scope-clear {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px; height: 16px;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    flex-shrink: 0;
    transition: background var(--dur-hover), color var(--dur-hover);
  }
  .scope-clear svg { width: 11px; height: 11px; }
  .scope-clear:hover { background: var(--bg5); color: var(--text); }
  /* スコープ選択（フォルダ限定）ボタン */
  .scope-pick {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    flex-shrink: 0;
    transition: background var(--dur-hover), color var(--dur-hover), border-color var(--dur-hover);
  }
  .scope-pick svg { width: 13px; height: 13px; }
  .scope-pick:hover { background: var(--bg3); color: var(--text); border-color: var(--border); }
  .toolbar-spacer { flex: 1; }

  .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  .left-pane {
    width: var(--left-w);
    min-width: 240px;
    max-width: 36vw;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .preview-pane {
    width: var(--right-w);
    min-width: 300px;
    max-width: 42vw;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body.preview-collapsed .preview-pane,
  body.preview-collapsed #resizerR { display: none; }

  .resizer {
    width: 4px;
    flex-shrink: 0;
    background: transparent;
    cursor: col-resize;
    z-index: 10;
    transition: background 150ms;
  }
  .resizer:hover, .resizer.dragging { background: var(--accent); }

  /* ═══════════════════════════════════════
     SECTION S4: 左ペイン結果リスト
  ═══════════════════════════════════════ */
  /* リストヘッダー：行の列幅と揃える（score 56px / name flex / size 52px / date 80px） */
  .list-header {
    display: flex;
    align-items: center;
    height: 26px;
    padding: 0 var(--sp-3);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
  }

  .col-h {
    display: flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    padding: 0;
    margin: 0;
    font: inherit;
    color: inherit;
    cursor: pointer;
    transition: color var(--dur-hover);
  }
  .col-h:hover { color: var(--text); }
  .col-h.sorted { color: var(--text2); }

  .col-h-score { width: 56px; margin-right: var(--sp-2); justify-content: flex-end; }
  .col-h-name  { flex: 1; min-width: 0; }
  /* フォルダ列ヘッダー: コンパクト時のみ表示。行(.row-folder-col)と flex 規則・padding を
     完全一致させ、ヘッダーラベルとパス文字列の開始位置を揃える */
  .col-h-folder { display: none; justify-content: flex-start; }
  .col-h-size,
  .col-h-date  { display: none; justify-content: flex-end; }
  .left-pane.w-md .col-h-size { display: flex; width: 52px; }
  .left-pane.w-lg .col-h-date { display: flex; width: 80px; white-space: nowrap; }

  /* コンパクト時: 名前列ヘッダーを行 .row-main と、フォルダ列ヘッダーを .row-folder-col と一致させる。
     flex-basis を 0 に統一し、ヘッダー「名前」とデータ行のコンテンツ幅の差で列開始位置がずれるのを防ぐ */
  .left-pane.view-compact .col-h-name {
    flex: 1 1 0;
    min-width: 120px;
  }
  .left-pane.view-compact .col-h-folder {
    display: flex;
    flex: 1 1000 0;
    min-width: 0;
    padding-left: var(--sp-2);
  }

  .sort-ico {
    display: inline-flex;
    width: 8px;
    height: 8px;
    flex-shrink: 0;
    transition: transform 120ms var(--ease-out);
  }
  .sort-ico svg { width: 8px; height: 8px; }
  .col-h.sorted.desc .sort-ico { transform: rotate(180deg); }

  /* ファイルリスト */
  .file-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .file-list::-webkit-scrollbar { width: 6px; }
  .file-list::-webkit-scrollbar-track { background: transparent; }
  .file-list::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }

  .file-row {
    position: relative;
    display: flex;
    align-items: center;
    height: 40px;
    flex-shrink: 0;
    padding: 0 var(--sp-3);
    cursor: pointer;
    transition:
      opacity var(--dur-enter) var(--ease-out),
      transform var(--dur-enter) var(--ease-out),
      background var(--dur-hover);
  }

  /* 行の入場アニメーション */
  .file-row.pre {
    opacity: 0;
    transform: translateY(4px);
  }

  /* 左端ヒートバー：ヒートマップ色をJSが --heat-bg に注入 */
  .row-heatbar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--heat-bg, transparent);
    opacity: 0.9;
  }

  /* 一致スコア列 */
  .row-score {
    flex-shrink: 0;
    width: 56px;
    margin-right: var(--sp-2);
  }
  .row-score-num {
    display: block;
    font-size: 11px;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .row-score-bar {
    height: 3px;
    width: 100%;
    margin-top: 3px;
    background: var(--bg4);
    border-radius: 2px;
    overflow: hidden;
  }
  .row-score-fill {
    height: 100%;
    background: var(--heat-bg, var(--accent));
    transform-origin: left;
    border-radius: 2px;
  }

  /* 名前・フォルダ（2行構成） */
  .row-main { flex: 1; min-width: 0; }
  .row-name { display: flex; align-items: center; gap: 6px; overflow: hidden; }
  .row-file {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row-folder {
    margin-top: 1px;
    font-size: 10px;
    color: var(--text3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* フォルダ列（コンパクトモードのみ表示）
     flex-shrink を名前列より桁違いに大きくし、ペイン縮小時はフォルダ列が
     先に縮みきってから名前列が縮むようにする（基準幅 auto で縮小量に重みを持たせる） */
  .row-folder-col {
    display: none;
    flex: 1 1000 0;
    min-width: 0;
    font-size: 10px;
    color: var(--text3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: left;
    padding-left: var(--sp-2);
  }
  .left-pane.view-compact .row-folder-col { display: block; }

  /* サイズ・更新日時（ペイン幅に応じて表示） */
  .row-size,
  .row-date {
    display: none;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .left-pane.w-md .row-size { display: block; width: 52px; }
  .left-pane.w-lg .row-date { display: block; width: 80px; white-space: nowrap; }

  /* 状態 */
  .file-row:hover { background: var(--hover-bg); }
  .file-row.selected { background: var(--sel-bg); }
  .file-row.selected:hover { background: var(--sel-bg-hover); }
  .file-row.selected .row-heatbar { background: var(--accent-bright); }
  .file-row.selected .row-file { color: #fff; }
  .file-row:active { background: rgba(49,109,202,0.18); }
  .file-row:focus-visible {
    outline: 2px solid var(--accent-bright);
    outline-offset: -2px;
  }

  /* スケルトン行（ロード中） */
  .sk-row {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    height: 40px;
    flex-shrink: 0;
    padding: 0 var(--sp-3);
  }
  .sk-block {
    position: relative;
    overflow: hidden;
    background: var(--bg3);
    border-radius: 4px;
  }
  .sk-score { width: 40px; height: 10px; }
  .sk-badge { width: 26px; height: 16px; }
  .sk-line  { flex: 1; height: 10px; }

  /* シマーアニメーション */
  .sk-block::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(177,186,196,0.08), transparent);
    transform: translateX(-100%);
    animation: sk-shimmer 1.2s infinite;
  }
  @keyframes sk-shimmer {
    to { transform: translateX(200%); }
  }

  /* ═══════════════════════════════════════
     SECTION S5: 中央カラムエクスプローラー＋ヒートマップ
  ═══════════════════════════════════════ */
  .center-pane {
    flex: 1;
    min-width: 280px;
    display: flex;
    overflow: hidden;
    background: var(--bg);
  }

  .columns-scroll {
    flex: 1;
    display: flex;
    gap: var(--sp-2);
    padding: var(--sp-3);
    overflow-x: auto;
    overflow-y: hidden;
  }
  .columns-scroll::-webkit-scrollbar { height: 6px; }
  .columns-scroll::-webkit-scrollbar-track { background: transparent; }
  .columns-scroll::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }

  /* カラムパネル */
  .col-panel {
    flex-shrink: 0;
    width: 208px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg2);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-md);
    transition:
      opacity var(--dur-panel) var(--ease-out),
      transform var(--dur-panel) var(--ease-out);
  }
  .col-panel.pre {
    opacity: 0;
    transform: translateX(-12px);
  }
  .col-panel.in {
    opacity: 1;
    transform: none;
  }

  /* カラムヘッダー */
  .col-head {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border-subtle);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    flex-shrink: 0;
  }
  .col-depth {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border-radius: 4px;
    background: var(--bg4);
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    flex-shrink: 0;
  }
  .col-head-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* カラム本体 */
  .col-body {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .col-body::-webkit-scrollbar { width: 4px; }
  .col-body::-webkit-scrollbar-track { background: transparent; }
  .col-body::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 2px; }

  /* カラムアイテム */
  .col-item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
    height: 28px;
    padding: 0 10px;
    cursor: pointer;
    transition:
      opacity var(--dur-enter) var(--ease-out),
      transform var(--dur-enter) var(--ease-out);
  }

  /* 入場アニメーション（transition-delayはJSが注入） */
  .col-item.pre {
    opacity: 0;
    transform: translateX(-8px);
  }
  .col-item.in {
    opacity: 1;
    transform: none;
  }

  /* ヒートマップ背景オーバーレイ：z-index:0（最背面）。
     スコア → 輝度は JS の heatBg() が hsl(220,80%, 20%+score*60%) で算出 */
  .heat-overlay {
    position: absolute;
    inset: 0;
    z-index: 0;
    background: var(--heat-bg, transparent);
    opacity: calc(var(--heat-opacity, 0) * var(--heat-alpha-max));
    transition: opacity var(--dur-panel) var(--ease-out);
    pointer-events: none;
  }

  /* hover層：z-index:1。ヒート点灯済みでもhoverを視認できるよう疑似要素で重ねる */
  .col-item::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    background: transparent;
    pointer-events: none;
    transition: background var(--dur-hover);
  }
  .col-item:hover::after {
    background: rgba(255,255,255,0.055);
  }

  /* 左端ヒートバー：面のopacityでは潰れる低スコア帯をフル彩度の輝度差で判別させる */
  .item-heatbar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    z-index: 2;
    width: 2px;
    background: var(--heat-bg, transparent);
    opacity: calc(var(--heat-opacity, 0) * 0.9);
  }

  /* コンテンツ：z-index:2（最前面） */
  .col-icon,
  .col-name,
  .col-chevron,
  .col-score,
  .col-connector {
    position: relative;
    z-index: 2;
  }

  .col-icon {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    color: var(--text2);
  }
  .col-icon svg { width: 13px; height: 13px; }
  .col-item .col-icon.ico-folder { color: var(--folder); }
  .col-item .col-icon.ico-code   { color: var(--c-tsx); }

  .col-name {
    flex: 1;
    min-width: 0;
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .col-chevron {
    flex-shrink: 0;
    color: var(--text3);
    display: flex;
  }
  .col-chevron svg { width: 10px; height: 10px; }

  /* スコアpill：found のみ。フル不透明背景＋輝度に応じた2値文字色で可読性を確保 */
  .col-score {
    flex-shrink: 0;
    padding: 1px 6px;
    border-radius: var(--r-pill);
    background: var(--heat-bg, var(--bg4));
    color: var(--heat-text, var(--text2));
    font-size: 10px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    transition:
      opacity var(--dur-enter) var(--ease-out),
      transform var(--dur-enter) var(--ease-out);
  }
  .col-score.pre {
    opacity: 0;
    transform: scale(0.8);
  }

  /* アクティブパスのコネクタ：active時のみ表示 */
  .col-connector {
    display: none;
    flex-shrink: 0;
    color: var(--accent-bright);
    filter: drop-shadow(0 0 3px rgba(88,166,255,0.8));
  }
  .col-connector svg { width: 10px; height: 10px; }
  .col-item.active .col-connector { display: flex; }

  /* 状態 */
  .col-item.active {
    box-shadow: inset 2px 0 0 var(--accent-bright), inset 0 0 0 1px rgba(88,166,255,0.35);
  }
  .col-item.active .col-name {
    color: #fff;
    font-weight: 500;
  }

  /* A*が掘らなかった（skipped）項目は減衰表示。ただしフォルダは手動で潜れるよう
     chevron とポインタを残す（Finder型ナビ）。skipped ファイルのみ dead-end 扱い。 */
  .col-item.skip .col-icon,
  .col-item.skip .col-name,
  .col-item.skip .col-chevron {
    opacity: 0.55;
  }
  .col-item.skip:hover .col-icon,
  .col-item.skip:hover .col-name,
  .col-item.skip:hover .col-chevron {
    opacity: 0.85;
  }

  .col-item:focus-visible {
    outline: 2px solid var(--accent-bright);
    outline-offset: -2px;
  }

  /* AIガイドパスライン：確定パス選択時に発光 */
  .guide-path-glow {
    height: 2px;
    margin: 4px 10px 6px;
    border-radius: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent-bright), var(--accent));
    box-shadow: 0 0 6px 1px var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 320ms var(--ease-out);
  }
  .guide-path-glow.on {
    transform: scaleX(1);
    animation: glow-pulse 600ms ease-out 1;
  }
  @keyframes glow-pulse {
    0%   { box-shadow: 0 0 14px 3px var(--accent-bright); }
    100% { box-shadow: 0 0 6px 1px var(--accent); }
  }

  /* ═══════════════════════════════════════
     SECTION S6: プレビューペイン
  ═══════════════════════════════════════ */
  .preview-header {
    display: flex;
    gap: var(--sp-2);
    align-items: flex-start;
    padding: 10px 12px 6px;
    flex-shrink: 0;
  }
  .preview-title { flex: 1; min-width: 0; }
  .preview-filename {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    word-break: break-all;
  }
  .preview-path {
    margin-top: 2px;
    font-size: 10px;
    color: var(--text3);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .preview-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 12px 10px;
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .meta-chip {
    display: flex; align-items: center; gap: 5px;
    background: var(--bg3);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-pill);
    padding: 2px 8px;
  }
  .meta-k { font-size: 10px; color: var(--text3); }
  .meta-v { font-size: 11px; color: var(--text2); font-variant-numeric: tabular-nums; }
  .score-pill {
    background: var(--heat-bg, var(--bg4));
    color: var(--heat-text, var(--text2));
    border-radius: var(--r-pill);
    padding: 0 6px;
    font-size: 10px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* AIガイド表示（score >= 0.8 のファイルのみ） */
  .preview-guide {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px 0;
    color: var(--accent-bright);
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .preview-guide svg {
    width: 12px; height: 12px;
    filter: drop-shadow(0 0 3px rgba(88,166,255,0.6));
    flex-shrink: 0;
  }
  .preview-guide .guide-line {
    flex: 1;
    height: 2px;
    border-radius: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent-bright), transparent);
    box-shadow: 0 0 6px rgba(49,109,202,0.6);
  }

  .preview-body {
    flex: 1;
    overflow: auto;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }
  .preview-body::-webkit-scrollbar { width: 6px; height: 6px; }
  .preview-body::-webkit-scrollbar-track { background: transparent; }
  .preview-body::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }

  /* プレビュー内容の入れ替えフェード（header〜truncバナーまでを縦flexで包む） */
  .pv-view {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    opacity: 1;
    transition: opacity 160ms var(--ease-out);
  }
  .pv-view.pre { opacity: 0; }

  /* コードビュー */
  .pv-code {
    font: 12px/1.6 var(--font-mono);
    padding: 8px 0;
    user-select: text;
  }
  .pv-line { display: flex; }
  .pv-line:hover { background: rgba(177,186,196,0.04); }
  .pv-ln {
    width: 40px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 12px;
    color: var(--text3);
    user-select: none;
    font-variant-numeric: tabular-nums;
    position: sticky;
    left: 0;
    background: var(--bg);
  }
  .pv-tx { white-space: pre; padding-right: 16px; }

  /* 簡易シンタックスハイライト（GitHub Dark 準拠・全色 bg 上 4.5:1 以上） */
  .tok-kw   { color: #ff7b72; }
  .tok-str  { color: #a5d6ff; }
  .tok-fn   { color: #d2a8ff; }
  .tok-num  { color: #79c0ff; }
  .tok-type { color: #ffa657; }
  .tok-cm   { color: #8b949e; font-style: italic; }

  /* Markdownビュー（レンダリング済みHTMLを静的表示） */
  .pv-md {
    padding: 14px 16px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
    user-select: text;
  }
  .pv-md h1 {
    font-size: 16px; font-weight: 600;
    border-bottom: 1px solid var(--border-subtle);
    padding-bottom: 6px;
    margin-bottom: 10px;
  }
  .pv-md h2 { font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
  .pv-md p { margin: 6px 0; color: var(--text2); }
  .pv-md ul { padding-left: 18px; margin: 6px 0; color: var(--text2); }
  .pv-md li { margin: 3px 0; }
  .pv-md strong { color: var(--text); }
  .pv-md code {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--bg3);
    border: 1px solid var(--border-subtle);
    border-radius: 3px;
    padding: 0 4px;
    color: var(--text);
  }
  .pv-md pre {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--bg2);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-md);
    padding: 10px 12px;
    margin: 8px 0;
    overflow-x: auto;
    color: var(--text);
    white-space: pre;
  }

  /* 非対応形式 */
  .pv-format { font-family: var(--font-mono); color: var(--text3); font-size: 11px; }

  /* truncated バナー（backend.md §6: 先頭64KBのみ） */
  .preview-trunc {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: rgba(210,153,34,0.12);
    border-top: 1px solid rgba(210,153,34,0.4);
    color: var(--warn);
    font-size: 11px;
    flex-shrink: 0;
  }
  .preview-trunc svg { width: 12px; height: 12px; flex-shrink: 0; }

  /* プレビューローディング（選択デバウンス150msの間に表示） */
  .pv-skel {
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .pv-skel .sk-block { height: 10px; }

  /* ═══════════════════════════════════════
     SECTION S7: ステータスバー
  ═══════════════════════════════════════ */
  .statusbar {
    height: 24px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 10px;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text3);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
    transition: background 200ms;
  }
  .status-dot.loading { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
  .status-phase { color: var(--text2); white-space: nowrap; }
  .status-note { color: var(--text3); white-space: nowrap; }

  .status-log {
    font: 10px/1 var(--font-mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .status-log .entry { display: inline-block; transition: opacity var(--dur-exit) var(--ease-out), transform var(--dur-exit) var(--ease-out); }
  .status-log .entry.pre { opacity: 0; transform: translateY(3px); }
  .log-open  { color: var(--accent-bright); }
  .log-skip  { color: var(--text3); }
  .log-found { color: var(--success); }
  .log-info  { color: var(--text2); }

  .status-spacer { flex: 1; }
  .status-counts { white-space: nowrap; color: var(--text3); }
  .status-counts b { color: var(--text2); font-weight: 500; font-variant-numeric: tabular-nums; }
  .status-ms {
    font-variant-numeric: tabular-nums;
    color: var(--text2);
    min-width: 48px;
    text-align: right;
    white-space: nowrap;
  }
  .status-hints { display: flex; gap: 10px; white-space: nowrap; align-items: center; }
  .status-hints .hint { display: flex; gap: 3px; align-items: center; }

  /* ═══════════════════════════════════════
     SECTION S8: keyframes・補足・reduced-motion
  ═══════════════════════════════════════ */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }
  @keyframes search-sweep {
    to { transform: translateX(100%); }
  }

  /* ソート対象外の列は矢印を隠す（S4補足） */
  .col-h:not(.sorted) .sort-ico { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ═══════════════════════════════════════
     SECTION S9: 左ペイン表示モード（コンパクト / 標準 / 詳細）
  ═══════════════════════════════════════ */

  /* コンパクト: 1行 28px */
  .left-pane.view-compact .file-row   { height: 28px; }
  .left-pane.view-compact .sk-row     { height: 28px; }
  .left-pane.view-compact .row-folder { display: none; }
  /* 名前列は flex-basis を 0 に揃え（ヘッダーの col-h-name と同一）、min-width で下限を確保。
     フォルダ列が先に 0 まで縮みきってから名前列が縮む。 */
  .left-pane.view-compact .row-main   { flex: 1 1 0; min-width: 120px; }

  /* 詳細: 44px + size/date 常時表示（ResizeObserver の w-md/w-lg を !important で上書き） */
  .left-pane.view-detail .file-row    { height: 44px; }
  .left-pane.view-detail .sk-row      { height: 44px; }
  .left-pane.view-detail .row-size,
  .left-pane.view-detail .row-date    { display: block !important; }
  .left-pane.view-detail .col-h-size,
  .left-pane.view-detail .col-h-date  { display: flex  !important; }

  /* ── 表示ポップアップ ── */
  .view-popup {
    position: fixed; z-index: 1100;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r-md);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.3);
    min-width: 210px; padding: var(--sp-1) 0 var(--sp-2);
    transform: scale(0.96) translateY(-4px); opacity: 0; pointer-events: none;
    transition: opacity var(--dur-enter) var(--ease-out),
                transform var(--dur-enter) var(--ease-out);
  }
  .view-popup.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: auto; }

  .view-popup-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text3);
    padding: var(--sp-1) var(--sp-3) var(--sp-2); user-select: none;
  }
  .view-popup-item {
    position: relative;
    display: grid;
    grid-template-columns: 16px 44px 1fr;
    grid-template-rows: auto auto;
    grid-template-areas: "radio preview name" "radio preview desc";
    align-items: center; column-gap: var(--sp-2);
    width: 100%; padding: var(--sp-2) var(--sp-3);
    background: none; border: none; color: var(--text);
    font: 400 12px var(--font); cursor: pointer; text-align: left;
    transition: background var(--dur-hover);
  }
  .view-popup-item:hover,
  .view-popup-item.focused { background: var(--hover-bg); }
  .view-popup-item:focus-visible { outline: 2px solid var(--accent-bright); outline-offset: -2px; }

  .view-popup-radio {
    grid-area: radio; align-self: center;
    width: 12px; height: 12px; border-radius: var(--r-pill);
    border: 1.5px solid var(--border);
    transition: border-color var(--dur-hover), background var(--dur-hover);
  }
  .view-popup-item[aria-checked="true"] .view-popup-radio {
    border-color: var(--accent-bright); background: var(--accent-bright);
    box-shadow: inset 0 0 0 2.5px var(--bg2);
  }
  .view-popup-preview {
    grid-area: preview; width: 40px; height: auto; color: var(--text2);
    border: 1px solid var(--border-subtle); border-radius: var(--r-sm);
    background: var(--bg3); padding: 1px;
  }
  .view-popup-item[aria-checked="true"] .view-popup-preview { border-color: var(--accent); }
  .view-popup-name { grid-area: name; font-weight: 500; font-size: 12px; color: var(--text); }
  .view-popup-item[aria-checked="true"] .view-popup-name { color: var(--accent-bright); }
  .view-popup-desc { grid-area: desc; font-size: 10px; color: var(--text3); margin-top: 1px; }
  .view-popup-item[aria-checked="true"]::before {
    content: ''; position: absolute;
    left: 0; top: 4px; bottom: 4px; width: 2px;
    background: var(--accent-bright); border-radius: 1px;
  }
</style>

<body>

<!-- ══════════════ TITLEBAR ══════════════ -->
<div class="titlebar">

  <div class="titlebar-logo">
    <svg class="logo-mark" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="10" y1="5.5" x2="10" y2="9" stroke="#58677a" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="10" y1="9" x2="5.5" y2="14" stroke="#58677a" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="10" y1="9" x2="14.5" y2="14" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="10" cy="4.5" r="2" fill="#3fb950"/>

/* CSSの0.01ms化だけではJS駆動のタイムラインに効かないため、JS側でも分岐する */
const RM = window.matchMedia('(prefers-reduced-motion: reduce)');

const state = {
  hasResults: false,
  selectedId: null,
  sortCol: 'score',
  sortAsc: false,
  files: FILES.slice(),
  navPath: [],          // 中央カラムで現在開いているフォルダ連鎖 [root, …]
};

/* ヒートマップ色: hsl(220,80%, 20%+score*60%)（frontend.md §2 準拠） */
function heatBg(score) { return `hsl(220, 80%, ${(20 + score * 60).toFixed(1)}%)`; }
/* スコアpill文字色: 背景輝度に応じた2値切替（0.6以上は明背景→黒文字で 4.5:1 以上を確保） */
function heatText(score) { return score >= 0.6 ? '#0d1117' : '#e6edf3'; }

function setHeat(el, score, heatState) {
  const op = heatState === 'skipped' ? score * 0.5 : score; // skipped は減衰して「見えるが掘られない」
  el.style.setProperty('--heat-bg', heatBg(score));
  el.style.setProperty('--heat-opacity', op.toFixed(3));
  el.style.setProperty('--heat-text', heatText(score));
}

const KNOWN_EXT = ['tsx', 'ts', 'css', 'md', 'json', 'rs', 'toml'];
function extBadge(ext) {
  const cls = KNOWN_EXT.includes(ext) ? 'ext-' + ext : 'ext-other';
  return `<span class="ext-badge ${cls}">${ext.slice(0, 4).toUpperCase()}</span>`;
}
const CODE_EXT = ['tsx', 'ts', 'jsx', 'js', 'css', 'rs', 'toml', 'json'];
function fileIconFor(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (CODE_EXT.includes(ext)) return `<span class="col-icon ico-code">${ICONS.fileCode}</span>`;
  if (ext === 'md' || ext === 'txt') return `<span class="col-icon">${ICONS.fileText}</span>`;
  return `<span class="col-icon">${ICONS.fileGeneric}</span>`;
}

/* ── 空状態 ── */
const EMPTY_RESULTS = `

    <div class="empty-title">検索キーワードを入力してください</div>
    <div class="empty-hint"><kbd>Ctrl</kbd><kbd>K</kbd> で検索 / <kbd>Enter</kbd> で実行</div>

const EMPTY_PREVIEW = `

/* ── 結果リスト ── */
function buildRow(f) {
  const row = document.createElement('div');
  row.className = 'file-row';
  row.tabIndex = 0;
  row.dataset.id = f.id;
  row.setAttribute('role', 'option');
  row.innerHTML =
    `<span class="row-heatbar"></span>` +
    `<div class="row-score"><span class="row-score-num">${f.score.toFixed(2)}</span>` +
    `<div class="row-score-bar"><div class="row-score-fill" style="transform:scaleX(${f.score})"></div></div></div>` +
    `<div class="row-main"><div class="row-name">${extBadge(f.ext)}<span class="row-file">${f.name}</span></div>` +
    `<div class="row-folder">${f.folder}</div></div>` +
    `<div class="row-folder-col">${f.folder}</div>` +
    `<div class="row-size">${f.size}</div><div class="row-date">${f.date}</div>`;
  row.style.setProperty('--heat-bg', heatBg(f.score));
  row.addEventListener('click', () => selectFile(f.id, false, true));
  return row;
}

function renderResults(opts = {}) {
  fileList.innerHTML = '';
  state.hasResults = true;
  const frag = document.createDocumentFragment();
  state.files.forEach(f => frag.appendChild(buildRow(f)));
  fileList.appendChild(frag);
  const rows = [...fileList.children];
  if (opts.stagger && !RM.matches) {
    rows.forEach((r, i) => { r.classList.add('pre'); r.style.transitionDelay = (i * 30) + 'ms'; });
    // 挿入直後に再フローを強制し、クラス除去を確実にトランジションとして発火させる
    void fileList.offsetWidth;
    rows.forEach(r => r.classList.remove('pre'));
    // hover背景の遷移にdelayが残らないよう入場後に除去
    setTimeout(() => rows.forEach(r => { r.style.transitionDelay = ''; }), rows.length * 30 + 400);
  }
  if (state.selectedId) {
    const sel = fileList.querySelector(`[data-id="${state.selectedId}"]`);
    if (sel) sel.classList.add('selected');
  }
}

function renderSkeleton() {
  state.hasResults = false;
  const widths = [72, 55, 80, 48, 64, 70];
  fileList.innerHTML = widths.map(w =>
    `<div class="sk-row"><span class="sk-block sk-score"></span><span class="sk-block sk-badge"></span>` +
    `<span class="sk-block sk-line" style="flex:0 0 ${w}%"></span></div>`).join('');
}

/* ── カラムエクスプローラー（Finder型カラムナビ） ──
   state.navPath = 現在開いているフォルダ連鎖 [root, …]。
   カラム ci は navPath[ci] の children を表示し、navPath[ci+1] が ci で選択中のフォルダ。
   確定パス末端（Button）のノードを基準にガイドグローを出し分ける。 */
const DEFAULT_LEAF = COL_NODES_DEFAULT[COL_NODES_DEFAULT.length - 1];

/* ノード → カラム表示オブジェクト */
function colObjFor(node, depth) {
  return { label: depth === 0 ? 'ルート' : node.name, node, items: node.children || [] };
}

function buildColumn(col, depth, animate) {
  const panel = document.createElement('div');
  panel.className = 'col-panel ' + (animate ? 'pre' : 'in');
  panel.dataset.depth = depth;
  panel.innerHTML =
    `<div class="col-head"><span class="col-depth">${depth + 1}</span><span class="col-head-label">${col.label}</span></div>`;
  const body = document.createElement('div');
  body.className = 'col-body';
  col.items.forEach((item, itemIdx) => {
    const el = document.createElement('div');
    el.className = 'col-item ' + (animate ? 'pre' : 'in');
    el.tabIndex = 0;
    el.dataset.idx = itemIdx;
    // ファイルは fileId（無い合成ファイルは name 由来の擬似ID）で選択状態を同期
    if (item.type === 'file') el.dataset.fileId = item.fileId || ('f:' + depth + ':' + item.name);
    const icon = item.type === 'folder'
      ? `<span class="col-icon ico-folder">${ICONS.folder}</span>`
      : fileIconFor(item.name);
    el.innerHTML =
      `<div class="heat-overlay"></div><span class="item-heatbar"></span>` + icon +
      `<span class="col-name">${item.name}</span>` +
      (item.type === 'folder' ? `<span class="col-chevron">${ICONS.chevronRight}</span>` : '') +
      (item.state === 'found' ? `<span class="col-score${animate ? ' pre' : ''}">${item.score.toFixed(2)}</span>` : '') +
      `<span class="col-connector">${ICONS.arrowRight}</span>`;
    if (!animate) {
      if (item.state === 'skipped') el.classList.add('skip');
      if (item.onPath) el.classList.add('active');
      setHeat(el, item.score, item.state);
    }
    el.addEventListener('click', () => onItemActivate(depth, itemIdx));
    body.appendChild(el);
  });
  // ガイドパスライン: 確定パス末端フォルダ（Button）の children カラムにのみ置く
  if (col.node === DEFAULT_LEAF) {
    const glow = document.createElement('div');
    glow.className = 'guide-path-glow';
    body.appendChild(glow);
  }
  panel.appendChild(body);
  return panel;
}

/* パネル入場アニメーション（demo / 対話ナビ共通）。
   finalStates=true（対話ナビ）では skip/heat を即時適用する。
   demo（false）では skipped の点灯を markSkip がログと同期して後追いする。 */
function animateColumnIn(panel, col, finalStates) {
  const items = [...panel.querySelectorAll('.col-item')];
  // 挿入直後に再フローを強制してからクラスを外し、transform/opacity の遷移として点灯させる
  void panel.offsetWidth;
  panel.classList.remove('pre'); panel.classList.add('in');
  items.forEach((el, i) => {
    el.style.transitionDelay = (i * 40) + 'ms';
    el.classList.remove('pre'); el.classList.add('in');
    const item = col.items[i];
    if (finalStates && item.state === 'skipped') el.classList.add('skip');
    if (finalStates || item.state !== 'skipped') setHeat(el, item.score, item.state);
    const pill = el.querySelector('.col-score');
    if (pill) { pill.style.transitionDelay = (i * 50 + 150) + 'ms'; pill.classList.remove('pre'); }
  });
  // 入場後は hover 遷移に delay が残らないよう除去
  setTimeout(() => items.forEach(el => {
    el.style.transitionDelay = '';
    const pill = el.querySelector('.col-score');
    if (pill) pill.style.transitionDelay = '';
  }), 800);
}

/* demo タイムライン用: COLUMNS[idx] を追加（navPath も同期） */
function addColumn(idx, animate) {
  const col = COLUMNS[idx];
  const panel = buildColumn(col, idx, animate);
  columnsScroll.appendChild(panel);
  state.navPath = COL_NODES_DEFAULT.slice(0, idx + 1);
  if (animate) animateColumnIn(panel, col);
  columnsScroll.scrollLeft = columnsScroll.scrollWidth;
  return panel;
}

/* 対話ナビ用: 任意ノードの children カラムを追加 */
function appendColumnNode(node, depth, animate) {
  const col = colObjFor(node, depth);
  const panel = buildColumn(col, depth, animate);
  columnsScroll.appendChild(panel);
  if (animate) animateColumnIn(panel, col, true);  // skip/heat を即時適用
  columnsScroll.scrollLeft = columnsScroll.scrollWidth;
  return panel;
}

/* 指定 depth 以降のカラムを除去。
   退場パネルを flex に残すと直後に積む新カラムが後ろへ回り込み順序が崩れるため、
   即時に切り離す。入れ替わりの動きは新カラム側の slide-in（appendColumnNode）が担う。 */
function truncateColumns(keep) {
  while (columnsScroll.children.length > keep) {
    columnsScroll.lastElementChild.remove();
  }
}

/* カラム ci 内の itemIdx を選択強調（同カラムの他項目は解除） */
function setColumnActive(ci, itemIdx) {
  const panel = columnsScroll.children[ci];
  if (!panel) return;
  panel.querySelectorAll('.col-item').forEach((el, i) =>
    el.classList.toggle('active', i === itemIdx));
}

/* 項目クリック: フォルダ→下階層カラムへ潜る / ファイル→選択してプレビュー */
function onItemActivate(ci, itemIdx) {
  const node = state.navPath[ci];
  if (!node || !node.children) return;
  const item = node.children[itemIdx];
  if (!item) return;

  if (item.type === 'folder') {
    if (item.state === 'skipped') {} // A*ではスキップ扱いだが、対話的には掘れるようにする
    setColumnActive(ci, itemIdx);
    // 既に同じフォルダを開いているなら何もしない（多重展開防止）
    if (state.navPath[ci + 1] === item && columnsScroll.children[ci + 1]) return;
    state.navPath = state.navPath.slice(0, ci + 1);
    state.navPath.push(item);
    truncateColumns(ci + 1);
    appendColumnNode(item, ci + 1, !RM.matches);
    syncGuideGlow();
  } else {
    // ファイル選択: より深いカラムは畳む（Finder挙動）
    setColumnActive(ci, itemIdx);
    state.navPath = state.navPath.slice(0, ci + 1);
    truncateColumns(ci + 1);
    const el = columnsScroll.children[ci].querySelectorAll('.col-item')[itemIdx];
    selectFile(el.dataset.fileId);
    syncGuideGlow();
  }
}

/* 現在の右端カラムが確定パス末端のときだけ、選択ファイルに応じてグローを点灯 */
function syncGuideGlow() {
  const glow = columnsScroll.querySelector('.guide-path-glow');
  if (!glow) return;
  const f = FILES.find(x => x.id === state.selectedId);
  glow.classList.toggle('on', !!f && f.score >= 0.8);
}

function renderColumnsFinal() {
  columnsScroll.innerHTML = '';
  COL_NODES_DEFAULT.forEach((node, i) => {
    const col = colObjFor(node, i);
    const panel = buildColumn(col, i, false);
    columnsScroll.appendChild(panel);
  });
  state.navPath = COL_NODES_DEFAULT.slice();
  const glow = columnsScroll.querySelector('.guide-path-glow');
  if (glow) glow.classList.add('on');
}

function markSkip(colIdx, itemIdx) {
  const panel = columnsScroll.children[colIdx];
  if (!panel) return;
  const el = panel.querySelectorAll('.col-item')[itemIdx];
  if (!el) return;
  el.classList.add('skip');
  setHeat(el, COLUMNS[colIdx].items[itemIdx].score, 'skipped');
}

/* 確定パスの連鎖点灯（80ms間隔）→ 末尾でガイドラインが発光 */
function lightPath() {
  COLUMNS.forEach((col, ci) => {
    const ii = col.items.findIndex(it => it.onPath);
    if (ii < 0) return;
    schedule(ci * 80, () => {
      const panel = columnsScroll.children[ci];
      const el = panel && panel.querySelectorAll('.col-item')[ii];
      if (el) el.classList.add('active');
    });
  });
  schedule(COLUMNS.length * 80 + 80, () => {
    const glow = columnsScroll.querySelector('.guide-path-glow');
    if (glow) glow.classList.add('on');
  });
}

/* ── プレビュー ── */
let previewTimer = null;

/* fileId からツリー上のノード連鎖 [root, …folders, file] を探す（左リスト選択時のナビ復元用） */
function pathToFile(fileId) {
  const stack = [];
  function dfs(node) {
    stack.push(node);
    if (node.type === 'file' && node.fileId === fileId) return true;
    if (node.children) for (const c of node.children) { if (dfs(c)) return true; }
    stack.pop();
    return false;
  }
  return dfs(TREE) ? stack.slice() : null;
}

/* 左リストからの選択時、中央カラムをそのファイルのツリーパスへ追従させる */
function navigateColumnsToFile(fileId) {
  const chain = pathToFile(fileId);
  if (!chain) return false;                          // ツリー外（合成データ）のファイルは追従しない
  const folders = chain.slice(0, -1);                // root..親フォルダ
  // 既存カラムと一致する深さまでは保持し、分岐点以降だけ作り直す（無駄な再描画を避ける）
  let diverge = folders.length;
  for (let i = 0; i < folders.length; i++) {
    if (state.navPath[i] !== folders[i]) { diverge = i; break; }
  }
  if (diverge < state.navPath.length || columnsScroll.children.length !== folders.length) {
    truncateColumns(diverge);
    for (let i = diverge; i < folders.length; i++) {
      appendColumnNode(folders[i], i, !RM.matches);
    }
    state.navPath = folders.slice();
  }
  return true;
}

function selectFile(id, instant, fromList) {
  state.selectedId = id;
  fileList.querySelectorAll('.file-row').forEach(r =>
    r.classList.toggle('selected', r.dataset.id === id));
  // 左リスト発の選択は中央カラムをそのファイルのパスへ追従させる
  if (fromList) navigateColumnsToFile(id);
  // 表示中の全カラムから該当ファイル項目を強調（他は解除）
  const f = FILES.find(x => x.id === id);
  columnsScroll.querySelectorAll('.col-item').forEach(el => {
    if (el.dataset.fileId) el.classList.toggle('active', el.dataset.fileId === id);
  });
  syncGuideGlow();
  clearTimeout(previewTimer);
  if (instant || RM.matches) { renderPreview(id, true); return; }
  // 選択デバウンス模擬（backend.md §6: 100〜150ms）。連続選択は前回タイマーをキャンセル
  previewPane.innerHTML = `<div class="pv-skel">` +
    [90, 75, 85, 60, 80, 70, 40].map(w => `<span class="sk-block" style="width:${w}%"></span>`).join('') +
    `</div>`;
  previewTimer = setTimeout(() => renderPreview(id, false), 150);
}

function renderPreview(id, instant) {
  const f = FILES.find(x => x.id === id);
  const pv = PREVIEWS[id];
  if (!f || !pv) { previewPane.innerHTML = EMPTY_PREVIEW; return; }
  const fullPath = 'C:\\' + f.folder + '\\' + f.name;

  let bodyHtml;
  if (pv.type === 'code') {
    bodyHtml = `<div class="pv-code">` + pv.lines.map((l, i) =>
      `<div class="pv-line"><span class="pv-ln">${i + 1}</span><span class="pv-tx">${l}</span></div>`).join('') +
      `</div>`;
  } else if (pv.type === 'markdown') {
    bodyHtml = `<div class="pv-md">${pv.html}</div>`;
  } else {
    bodyHtml = `<div class="empty-state"><div class="empty-icon">${ICONS.fileGeneric}</div>` +
      `<div class="empty-title">プレビュー非対応の形式です</div>` +
      `<div class="empty-hint"><span class="pv-format">${pv.format} — ${pv.note}</span></div></div>`;
  }
  const guideHtml = f.score >= 0.8
    ? `<div class="preview-guide">${ICONS.spark}<span>AIガイド: 高一致ルート</span><span class="guide-line"></span></div>`
    : '';
  const truncHtml = pv.truncated
    ? `<div class="preview-trunc">${ICONS.warning}<span>先頭 64KB のみ表示しています（全体 ${f.size}）</span></div>`
    : '';
  const scoreStyle = `--heat-bg:${heatBg(f.score)};--heat-text:${heatText(f.score)}`;

  previewPane.innerHTML =
    `<div class="pv-view${instant ? '' : ' pre'}">` +
      `<div class="preview-header">${extBadge(f.ext)}<div class="preview-title">` +
        `<div class="preview-filename">${f.name}</div>` +
        `<div class="preview-path" title="${fullPath}">${fullPath}</div></div></div>` +
      `<div class="preview-meta">` +
        `<div class="meta-chip"><span class="meta-k">スコア</span><span class="score-pill" style="${scoreStyle}">${f.score.toFixed(2)}</span></div>` +
        `<div class="meta-chip"><span class="meta-k">サイズ</span><span class="meta-v">${f.size}</span></div>` +
        `<div class="meta-chip"><span class="meta-k">更新</span><span class="meta-v">${f.date}</span></div>` +
        `<div class="meta-chip"><span class="meta-k">形式</span><span class="meta-v">${f.ext}</span></div>` +
      `</div>` +
      guideHtml +
      `<div class="preview-body">${bodyHtml}</div>` +
      truncHtml +
    `</div>`;
  if (!instant) {
    const view = previewPane.firstElementChild;
    void view.offsetWidth; // 再フロー強制でトランジション発火
    view.classList.remove('pre');
  }
}

/* ── ステータスバー ── */
function setPhase(text) { statusPhase.textContent = text; }
function setNote(text)  { statusNote.textContent = text; }
function setDot(mode)   { statusDot.classList.toggle('loading', mode === 'loading'); }
function setCounts(o, s, f) {
  statusCounts.innerHTML = (o === null) ? '' :
    `展開 <b>${o}</b> ・ スキップ <b>${s}</b> ・ 発見 <b>${f}</b>`;
}
const counts = { o: 0, s: 0, f: 0 };
function bumpCount(key) { counts[key]++; setCounts(counts.o, counts.s, counts.f); }

function logEntry(text, type) {
  const span = document.createElement('span');
  span.className = `entry log-${type} pre`;
  span.textContent = text;
  statusLog.replaceChildren(span);
  void statusLog.offsetWidth; // 再フロー強制でトランジション発火
  span.classList.remove('pre');
}

/* 経過msカウンタ: 実速度<200msに対する意図的スロー再生のためrAFでカウントアップ演出 */
function startMs(duration, target) {
  const t0 = performance.now();
  const tick = now => {
    const p = Math.min((now - t0) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    statusMs.textContent = Math.round(target * ease) + 'ms';
    if (p < 1) demo.raf = requestAnimationFrame(tick);
  };
  demo.raf = requestAnimationFrame(tick);
}

/* ペイン分割リサイザー（左: dx そのまま / 右: dx 符号反転） */
function setupResizer(handle, pane, sign, minW, maxRatio) {
  let startX = 0, startW = 0, active = false;
  handle.addEventListener('mousedown', e => {
    active = true;
    startX = e.clientX;
    startW = pane.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
  });
  document.addEventListener('mousemove', e => {
    if (!active) return;
    const w = Math.min(Math.max(startW + sign * (e.clientX - startX), minW), window.innerWidth * maxRatio);
    pane.style.width = w + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!active) return;
    active = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
  });
}
setupResizer($('resizerL'), leftPane, 1, 240, 0.36);
setupResizer($('resizerR'), previewPane, -1, 300, 0.42);

/* 左ペイン幅に応じてサイズ・日付列の表示を切替 */
new ResizeObserver(entries => {
  const w = entries[0].contentRect.width;
  leftPane.classList.toggle('w-md', w >= 380);
  leftPane.classList.toggle('w-lg', w >= 460);
}).observe(leftPane);

/* ソート */
const headerBtns = document.querySelectorAll('.col-h');
headerBtns.forEach(btn => {
  btn.querySelector('.sort-ico').innerHTML = ICONS.sortArrow;
  btn.addEventListener('click', () => sortBy(btn.dataset.sort));
});
function sortBy(col) {
  if (state.sortCol === col) state.sortAsc = !state.sortAsc;
  else { state.sortCol = col; state.sortAsc = col !== 'score'; } // スコアのみ降順を既定にする
  const dir = state.sortAsc ? 1 : -1;
  state.files.sort((a, b) => {
    let va, vb;
    if (col === 'name')        { va = a.name.toLowerCase();   vb = b.name.toLowerCase(); }
    else if (col === 'folder') { va = a.folder.toLowerCase(); vb = b.folder.toLowerCase(); }
    else if (col === 'size')   { va = a.sizeKB; vb = b.sizeKB; }
    else if (col === 'date')   { va = a.date;   vb = b.date; }
    else                       { va = a.score;  vb = b.score; }
    return va < vb ? -dir : va > vb ? dir : 0;
  });
  headerBtns.forEach(b => {
    const on = b.dataset.sort === col;
    b.classList.toggle('sorted', on);
    b.classList.toggle('desc', on && !state.sortAsc);
  });
  if (state.hasResults) renderResults({});
}

/* タイトルバーメニューの縮退（幅不足時はハンバーガーへ） */
const titlebarMenu  = $('titlebarMenu');
const menuHamburger = $('menuHamburger');

document.addEventListener('click', e => {

    menuDropdown.classList.remove('open');

function checkMenuOverflow() {
  const logo   = document.querySelector('.titlebar-logo');
  const search = document.querySelector('.titlebar-search-center');
  // 検索ボックスは中央固定（absolute）のため、メニューが使えるのは
  // ロゴ右端〜検索ボックス左端の間だけ。全幅からの引き算では重なりを検出できない
  const available = search.getBoundingClientRect().left
                  - logo.getBoundingClientRect().right
                  - 16;
  let totalW = 0;
  // display:none 時に幅0となり判定が振動するため、フォールバック幅80pxで安定化
  titlebarMenu.querySelectorAll('.menu-btn').forEach(b => { totalW += b.getBoundingClientRect().width || 80; });
  if (totalW > available) {
    titlebarMenu.style.display  = 'none';
    menuHamburger.style.display = 'flex';
  } else {
    titlebarMenu.style.display  = 'flex';
    menuHamburger.style.display = 'none';
    menuDropdown.classList.remove('open');
  }
}

const viewPopup    = $('viewPopup');
const menuBtnView  = $('menuBtnView');
const menuBtnViewH = $('menuBtnViewH');
const LS_KEY = 'treescout.viewMode';

let viewMode = localStorage.getItem(LS_KEY) || 'standard';
let viewPopupOpen = false;

function applyViewMode(mode) {
  viewMode = mode;
  leftPane.classList.remove('view-compact', 'view-detail');
  if (mode === 'compact') leftPane.classList.add('view-compact');
  if (mode === 'detail')  leftPane.classList.add('view-detail');
  viewPopup.querySelectorAll('.view-popup-item').forEach(btn => {
    btn.setAttribute('aria-checked', String(btn.dataset.mode === mode));
  });
  localStorage.setItem(LS_KEY, mode);
}

function openViewPopup(anchorBtn) {
  if (viewPopupOpen) { closeViewPopup(); return; }
  const rect = anchorBtn.getBoundingClientRect();
  viewPopup.removeAttribute('hidden');
  viewPopup.style.top  = rect.bottom + 'px';
  viewPopup.style.left = rect.left + 'px';
  void viewPopup.offsetWidth; // reflow で transition を確実に発火
  const maxLeft = window.innerWidth - viewPopup.offsetWidth - 4;
  if (parseFloat(viewPopup.style.left) > maxLeft)
    viewPopup.style.left = maxLeft + 'px';
  viewPopup.classList.add('open');
  viewPopupOpen = true;
  [menuBtnView, menuBtnViewH].forEach(b => b && b.setAttribute('aria-expanded', 'true'));
  (viewPopup.querySelector(`[data-mode="${viewMode}"]`)
   || viewPopup.querySelector('.view-popup-item')).focus();
}

function closeViewPopup() {
  if (!viewPopupOpen) return;
  viewPopup.classList.remove('open');
  viewPopupOpen = false;
  [menuBtnView, menuBtnViewH].forEach(b => b && b.setAttribute('aria-expanded', 'false'));
  const dur = parseFloat(getComputedStyle(viewPopup).transitionDuration) * 1000 || 120;
  setTimeout(() => { if (!viewPopupOpen) viewPopup.setAttribute('hidden', ''); }, dur);
}

viewPopup.querySelectorAll('.view-popup-item').forEach(btn => {
  btn.addEventListener('click', () => { applyViewMode(btn.dataset.mode); closeViewPopup(); });
});

function onViewBtnClick(e) {
  e.stopPropagation();
  openViewPopup(e.currentTarget);
}
menuBtnView  && menuBtnView.addEventListener('click', onViewBtnClick);
menuBtnViewH && menuBtnViewH.addEventListener('click', onViewBtnClick);

document.addEventListener('click', e => {
  if (viewPopupOpen
      && !viewPopup.contains(e.target)
      && e.target !== menuBtnView
      && e.target !== menuBtnViewH)
    closeViewPopup();
});

const demo = { timers: [], raf: null, running: false };

  schedule(1750, () => selectFile('buttongroup'));
}

/* デモ完了後の最終状態を即時描画（初期表示・reduced-motion 用） */
function renderFinal() {
  cancelDemo();
  state.selectedId = 'buttongroup';
  renderResults({});
  renderColumnsFinal();
  setDot('done');
  setPhase('完了 — 12件 / 182ms');
  setNote('');
  logEntry('found    ButtonGroup.tsx   f=0.95', 'found');
  setCounts(12, 5, 12);
  statusMs.textContent = '182ms';
  selectFile('buttongroup', true);
}

/* 空状態へ戻す（Esc） */
function resetToIdle() {
  cancelDemo();
  state.selectedId = null;
  state.hasResults = false;
  fileList.innerHTML = EMPTY_RESULTS;
  columnsScroll.innerHTML = EMPTY_COLUMNS;
  previewPane.innerHTML = EMPTY_PREVIEW;
  setDot('idle');
  setPhase('待機中');
  setNote('');
  statusLog.replaceChildren();
  setCounts(null);
  statusMs.textContent = '';
}

/* ═══════════════════════════════════════
   SECTION J5: キーボード操作・ヒント
═══════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.ctrlKey && (e.key === 'k' || e.key === 'K')) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
    return;
  }
  if (e.ctrlKey && (e.key === 'p' || e.key === 'P')) {
    e.preventDefault();
    togglePreview();
    return;
  }
  if (e.key === 'Escape') {
    if (viewPopupOpen) { closeViewPopup(); return; }
    if (document.activeElement === searchInput) searchInput.blur();
    resetToIdle();
    return;
  }
  // 表示ポップアップのキーボードナビ
  if (viewPopupOpen) {
    const items = [...viewPopup.querySelectorAll('.view-popup-item')];
    const cur = items.findIndex(el => el === document.activeElement);
    if (e.key === 'ArrowDown') { e.preventDefault(); items[(cur + 1) % items.length].focus(); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); items[(cur - 1 + items.length) % items.length].focus(); return; }
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (cur >= 0) { applyViewMode(items[cur].dataset.mode); closeViewPopup(); }
      return;
    }
    if (e.key === 'Tab') { closeViewPopup(); return; }
  }
  // 中央カラムにフォーカスがある場合: Finder型のキーボードナビ（↑↓移動 / →開く / ←戻る / Enter）
  const colItem = document.activeElement.closest && document.activeElement.closest('.col-item');
  if (colItem && ['ArrowDown','ArrowUp','ArrowRight','ArrowLeft','Enter',' '].includes(e.key)) {
    e.preventDefault();
    handleColumnKey(e.key, colItem);
    return;
  }

  if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && state.hasResults
      && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    const rows = [...fileList.querySelectorAll('.file-row')];
    if (!rows.length) return;
    const cur = rows.findIndex(r => r.dataset.id === state.selectedId);
    const next = e.key === 'ArrowDown'
      ? Math.min(cur + 1, rows.length - 1)
      : Math.max(cur - 1, 0);
    const row = rows[Math.max(next, 0)];
    selectFile(row.dataset.id, false, true);
    row.focus();
    row.scrollIntoView({ block: 'nearest' });
  }
});

/* 中央カラムのキーボード操作 */
function handleColumnKey(key, colItem) {
  const panel = colItem.closest('.col-panel');
  const ci = [...columnsScroll.children].indexOf(panel);
  const items = [...panel.querySelectorAll('.col-item')];
  const idx = items.indexOf(colItem);
  if (key === 'ArrowDown' || key === 'ArrowUp') {
    const next = key === 'ArrowDown'
      ? Math.min(idx + 1, items.length - 1)
      : Math.max(idx - 1, 0);
    items[next].focus();
    items[next].scrollIntoView({ block: 'nearest' });
  } else if (key === 'ArrowRight' || key === 'Enter' || key === ' ') {
    const node = state.navPath[ci];
    const item = node && node.children && node.children[idx];
    if (!item) return;
    onItemActivate(ci, idx);
    // フォルダを開いたら新カラムの先頭へフォーカスを送る
    if (item.type === 'folder') {
      const nextPanel = columnsScroll.children[ci + 1];
      const first = nextPanel && nextPanel.querySelector('.col-item');
      if (first) first.focus();
    }
  } else if (key === 'ArrowLeft') {
    // 親カラムの「このカラムを開いた項目」へフォーカスを戻す
    const prev = columnsScroll.children[ci - 1];
    if (!prev) return;
    const parentNode = state.navPath[ci - 1];
    const openedIdx = parentNode.children.indexOf(state.navPath[ci]);
    const target = prev.querySelectorAll('.col-item')[openedIdx >= 0 ? openedIdx : 0];
    if (target) target.focus();
  }
}

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); runDemo(); }
});

/* ── 探索スコープ（ブレッドクラム） ──
   既定は全体検索。フォルダ限定時のみパスチップ＋× を表示する。
   選択＝即適用のため別途「適用」操作は持たない（プライマリCTAは検索バーに一本化）。 */
const scopeChip  = $('scopeChip'),  scopeIco   = $('scopeIco');
const scopeText  = $('scopeText'),  scopeClear = $('scopeClear');
const scopePick  = $('scopePick');
let scopePath = '';

function renderScope() {
  if (scopePath) {
    scopeChip.classList.remove('scope-chip-all');
    scopeChip.title = scopePath;
    scopeIco.innerHTML = ICONS.folder;
    scopeText.textContent = scopePath;
    scopeClear.hidden = false;
  } else {
    scopeChip.classList.add('scope-chip-all');
    scopeChip.title = 'ドライブ全体を検索中';
    scopeIco.innerHTML = ICONS.globe;
    scopeText.textContent = '全体';
    scopeClear.hidden = true;
  }
}
scopeClear.innerHTML = ICONS.x;
scopePick.innerHTML  = ICONS.folder;
// モックではダイアログの代わりにサンプルパスを設定。選択＝即デモ再生（=即検索）
scopePick.addEventListener('click', () => { scopePath = 'C:\\src'; renderScope(); runDemo(); });
scopeClear.addEventListener('click', () => { scopePath = ''; renderScope(); });
renderScope();

/* 検索ボックスのkbdチップ: フォーカス中は Enter を促す */
searchInput.addEventListener('focus', () => { searchKbd.innerHTML = '<kbd>Enter</kbd>'; });
searchInput.addEventListener('blur',  () => { searchKbd.innerHTML = '<kbd>Ctrl</kbd><kbd>K</kbd>'; });

/* ステータスバー右端のコンテキスト連動ヒント */
function setHints(mode) {
  statusHints.innerHTML = mode === 'list'
    ? '<span class="hint"><kbd>↑</kbd><kbd>↓</kbd> 移動</span><span class="hint"><kbd>Ctrl</kbd><kbd>P</kbd> プレビュー</span>'
    : '<span class="hint"><kbd>Ctrl</kbd><kbd>K</kbd> 検索</span><span class="hint"><kbd>Enter</kbd> デモ再生</span>';
}
document.addEventListener('focusin', e => {
  setHints(e.target.closest && e.target.closest('.file-list') ? 'list' : 'default');
});

/* ═══════════════════════════════════════
   初期化: デモ完了後の状態を静的表示（モックとして全要素を見せる）
═══════════════════════════════════════ */
$('searchIcon').innerHTML = ICONS.search;
setHints('default');
checkMenuOverflow();
applyViewMode(viewMode);
renderFinal();

if (location.search.includes('demo')) setTimeout(runDemo, 100);
